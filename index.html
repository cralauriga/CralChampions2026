function cleanPersonTokenForImage(name){
  return smartSpace(String(name||'').replace(/\bx\s*\d+\b/ig,'').replace(/\(.*?\)/g,'').trim());
}
function cleanPersonTokenForTeamLookup(name){
  return cleanPersonTokenForImage(String(name||'')
    .replace(/\s+\d+\s*(?:gol|goal|reti?)\b/ig,'')
    .replace(/\b(?:gol|goal|reti?)\s*\d+\b/ig,''));
}
function playerTeamMap(){
  if(_playerTeamMapCache.value) return _playerTeamMapCache.value;
  const squadraFiles=sectionFiles('squadra');
  const map=new Map();
  for(const f of squadraFiles){
    const team=teamNameFromFile(f);
    for(const r of rowsToObjects(state.rows[f])){
      const names=playerImageNames(r);
      names.forEach(n=>{
        const key=norm(cleanPersonTokenForTeamLookup(n));
        if(key && !map.has(key)) map.set(key,team);
      });
    }
  }
  // Fallback: alcuni CSV marcatori/MVP contengono già la squadra accanto al giocatore.
  ['marcatori','mvp'].forEach(kind=>{
    sectionFiles(kind).forEach(f=>{
      rowsToObjects(state.rows[f]).forEach(r=>{
        const name=playerNameFromRow(r);
        const team=firstPresent(r,[['squadra','team','club']]);
        const key=norm(cleanPersonTokenForTeamLookup(name));
        if(key && team && !map.has(key)) map.set(key,teamDisplayNameForChart(team));
      });
    });
  });
  // Stesso motivo di rosterIdentityRecords: non bloccare in cache una mappa vuota
  // se esistono file squadra che semplicemente non sono ancora stati letti del tutto.
  if(map.size || !squadraFiles.length) _playerTeamMapCache.value=map;
  return map;
}
function playerRoleMap(){
  if(_playerRoleMapCache.value) return _playerRoleMapCache.value;
  const squadraFiles=sectionFiles('squadra');
  const map=new Map();
  for(const f of squadraFiles){
    for(const r of rowsToObjects(state.rows[f])){
      const role=fieldLoose(r,['ruolo','role','posizione','position']);
      if(!String(role||'').trim()) continue;
      const names=playerImageNames(r);
      names.forEach(n=>{
        const key=norm(cleanPersonTokenForTeamLookup(n));
        if(key && !map.has(key)) map.set(key,smartSpace(role));
      });
    }
  }
  if(map.size || !squadraFiles.length) _playerRoleMapCache.value=map;
  return map;
}
function matchPersonTokenToRow(name,row,teamHint){
  if(!name || !row || !personMatchKey(name)) return false;
  const rowValues=personIdentityValuesFromRow(row);
  if(!rowValues.length) return false;
  const rowTeam=teamHintFromRow(row);
  const leftTeam=teamHint || '';
  return rowValues.some(value=>personTokensReferToSamePlayer(name,value,leftTeam,rowTeam));
}
function teamFromContextRows(name,contextRows,usedRows,candidateTeams){
  const candidateKeys = candidateTeams && candidateTeams.length
    ? new Set(candidateTeams.map(t=>teamMatchKey(t)))
    : null;
  const matches=(contextRows||[]).filter(r=>{
    if(!matchPersonTokenToRow(name,r,teamHintFromRow(r))) return false;
    // Se conosciamo le squadre della partita corrente, scartiamo righe di contesto
    // che appartengono a UN'ALTRA partita della stessa giornata (es. la riga
    // "Marcatore" di un omonimo che gioca nella partita parallela). Senza questo
    // vincolo, una lista di marcatori che mescola più partite della giornata può
    // far scegliere la riga sbagliata anche quando la squadra giusta sarebbe
    // facilmente determinabile.
    if(candidateKeys){
      const rowTeam=teamHintFromRow(r) || firstPresent(r,[['squadra','team','club','squadra giocatore','squadra marcatore']]);
      const rowTeamKey=teamMatchKey(rowTeam||'');
      if(rowTeamKey && !candidateKeys.has(rowTeamKey)) return false;
    }
    return true;
  });
  // Se la stessa lista di marcatori ripete più volte lo stesso cognome (es. due
  // "Menolascina" di squadre diverse che segnano entrambi nella stessa partita),
  // ogni token va abbinato a una riga contesto DIVERSA, non sempre alla prima che
  // matcha. usedRows tiene traccia delle righe già "consumate" da token precedenti
  // nella stessa chiamata di addPeopleLineSmart, cosicché il secondo "Menolascina"
  // trovi la riga di Gerardo (BlackJack) invece di riprendere quella di Nicolandrea
  // (FC Stealthy Dribblers) già usata per il primo.
  const fresh = usedRows ? matches.filter(r=>!usedRows.has(r)) : matches;
  const pool = fresh.length ? fresh : matches;
  for(const r of pool){
    const team=firstPresent(r,[['squadra','team','club','squadra giocatore','squadra marcatore']]);
    if(String(team||'').trim()){
      if(usedRows) usedRows.add(r);
      return teamDisplayNameForChart(team);
    }
  }
  return '';
}
function roleFromContextRows(name,contextRows){
  const matches=(contextRows||[]).filter(r=>matchPersonTokenToRow(name,r,teamHintFromRow(r)));
  for(const r of matches){
    const role=fieldLoose(r,['ruolo','role','posizione','position']);
    if(String(role||'').trim()) return smartSpace(role);
  }
  return '';
}
function roleForPersonToken(name,contextRows){
  const contextRole=roleFromContextRows(name,contextRows);
  if(contextRole) return contextRole;
  const key=norm(cleanPersonTokenForTeamLookup(name));
  if(!key) return '';
  const map=playerRoleMap();
  if(map.has(key)) return map.get(key);
  // Match morbido per casi con solo cognome o soprannome nel riepilogo.
  const matches=[...map.entries()].filter(([k])=>k.includes(key)||key.includes(k));
  const distinctRoles=[...new Set(matches.map(([,role])=>role))];
  if(distinctRoles.length===1) return distinctRoles[0];
  return '';
}
function roleFallbackElForPerson(name,contextRows){
  const role=roleForPersonToken(name,contextRows);
  const d=document.createElement('div');
  d.className='mini-logo';
  d.textContent=role ? roleInitial(role) : initials(cleanPersonTokenForImage(name));
  d.title=role ? role : cleanPersonTokenForImage(name);
  d.setAttribute('aria-label',role ? ('Ruolo: '+role) : cleanPersonTokenForImage(name));
  return d;
}
function teamForPersonToken(name, fallbackTeam, contextRows, usedRows){
  const direct=teamDisplayNameForChart(fallbackTeam||'');
  if(direct) return direct;
  const contextTeam=teamFromContextRows(name,contextRows,usedRows);
  if(contextTeam) return contextTeam;
  const key=norm(cleanPersonTokenForTeamLookup(name));
  if(!key) return '';
  const map=playerTeamMap();
  if(map.has(key)) return map.get(key);
  // Match morbido per casi con solo cognome o soprannome nel riepilogo.
  // Dedup per squadra risultante: lo stesso giocatore spesso ha due chiavi nella
  // mappa (es. "nomecognome" e "cognomenome"), che altrimenti farebbero sembrare
  // ambiguo un match in realtà univoco.
  const matches=[...map.entries()].filter(([k])=>k.includes(key)||key.includes(k));
  const distinctTeams=[...new Set(matches.map(([,team])=>team))];
  if(distinctTeams.length===1) return distinctTeams[0];
  return '';
}
// Come teamForPersonToken, ma per i marcatori scritti in un'unica lista generica
// (senza distinzione "marcatori casa" / "marcatori trasferta"). In questo caso non
// abbiamo un singolo fallbackTeam: conosciamo però le due squadre della partita
// (candidateTeams). Se un cognome è condiviso da omonimi di squadre diverse, usiamo
// la rosa per restringere il match alle sole squadre che stanno realmente giocando,
// invece di ricadere sulla mappa globale (che tiene una sola voce per cognome e
// quindi può assegnare il logo della squadra sbagliata, es. due "Menolascina").
function teamForPersonTokenAmongTeams(name, candidateTeams, contextRows, usedRows){
  const teams=[...new Set((candidateTeams||[]).map(t=>teamDisplayNameForChart(t||'')).filter(Boolean))];
  // Passiamo le squadre candidate a teamFromContextRows così non sceglie per errore
  // la riga "Marcatore" di un omonimo che gioca nella partita PARALLELA della stessa
  // giornata (es. un altro "Menolascina" in una partita diversa): tra le righe di
  // contesto, consideriamo solo quelle delle due squadre che stanno giocando QUESTA
  // partita.
  const contextTeam=teamFromContextRows(name,contextRows,usedRows,teams);
  if(contextTeam) return contextTeam;
  if(teams.length){
    // Importante: prendiamo i match grezzi SENZA passare un teamHint a
    // rosterMatchesForPersonToken. Quella funzione, se il filtro per squadra non
    // trova nulla, ricade silenziosamente su TUTTI gli omonimi di qualsiasi squadra
    // (comportamento corretto per altri usi, ma qui ci servirebbe l'opposto: sapere
    // con certezza se una squadra NON ha quel giocatore). Filtriamo quindi noi stessi
    // sui risultati grezzi, per squadra candidata.
    const rawMatches=uniqueRosterRecords(rosterMatchesForPersonToken(name,''));
    const teamKeys=teams.map(t=>teamMatchKey(t));
    const matchesByTeam=teamKeys
      .map((teamKey,idx)=>({team:teams[idx],recs:rawMatches.filter(rec=>rec.teamKey===teamKey)}))
      .filter(x=>x.recs.length);
    // Caso normale: il cognome appartiene chiaramente a una sola delle due squadre in campo.
    if(matchesByTeam.length===1) return matchesByTeam[0].team;
    // Caso ambiguo: omonimi in entrambe le squadre della partita (es. due "Menolascina"
    // che si affrontano). Senza altro contesto (riga marcatori con colonna squadra) non
    // possiamo distinguerli con certezza, quindi non assegniamo un logo specifico:
    // meglio nessun logo che quello sbagliato.
    if(matchesByTeam.length>1) return '';
  }
  return teamForPersonToken(name,'',contextRows,usedRows);
}
function extractInlineField(text,label){
  const source=String(text||'');
  const labels='Marcatori|MVP|Riposa|Autogol|Autogoal|Note';
  const re=new RegExp(label+'\\s*:\\s*([\\s\\S]*?)(?=\\s*\\|\\s*(?:'+labels+')\\s*:|$)','i');
  const m=source.match(re);
  return m ? m[1].trim() : '';
}
function stripInlineField(text,label){
  const source=String(text||'');
  if(!source.trim()) return '';
  const labels='Marcatori|MVP|Riposa|Autogol|Autogoal|Note';
  const re=new RegExp('(?:^|\\s*\\|\\s*)'+label+'\\s*:\\s*[\\s\\S]*?(?=\\s*\\|\\s*(?:'+labels+')\\s*:|$)','ig');
  return source
    .replace(re,'')
    .replace(/^\\s*\\|\\s*/,'')
    .replace(/\\s*\\|\\s*$/,'')
    .replace(/\\s*\\|\\s*\\|\\s*/g,' | ')
    .trim();
}

function cleanRiepilogoNote(value){
  let out=stripInlineField(value,'Riposa');
  out=String(out||'')
    .replace(/(?:^|[|·,;-]\s*)riposa\s*:?\s*[^|·,;.-]+/ig,'')
    .replace(/\s*[|·,;-]\s*$/,'')
    .replace(/^\s*[|·,;-]\s*/,'')
    .replace(/\s{2,}/g,' ')
    .trim();
  return out;
}
function splitInlinePeople(value){
  return String(value||'')
    .split(/\s*(?:\n|\r|,|;|\+)\s*/)
    .map(x=>smartSpace(x))
    .filter(Boolean);
}
function labelEmoji(label){
  const k=norm(label);
  if(k.startsWith('marcatori')) return '⚽';
  if(k==='mvp' || k.includes('miglioreincampo')) return '⭐';
  return label;
}
function addPeopleLineSmart(parent,label,people,withImages,teamHint,contextRows,candidateTeams){
  if(!people || !people.length) return;
  const row=document.createElement('div');
  row.style.cssText='display:flex;gap:8px;align-items:flex-start;margin-top:8px;flex-wrap:wrap';
  const strong=document.createElement('b');
  strong.className='small';
  strong.style.minWidth='28px';
  strong.style.fontSize='16px';
  strong.textContent=labelEmoji(label);
  strong.title=label;
  strong.setAttribute('aria-label',label);
  row.appendChild(strong);
  const list=document.createElement('div'); list.style.cssText='display:flex;gap:6px;flex-wrap:wrap;align-items:center';
  // Set condiviso tra tutti i marcatori di QUESTA lista: se due token uguali (stesso
  // cognome) compaiono entrambi (es. due "Menolascina" che segnano nella stessa
  // partita), ogni token consuma la propria riga di contesto invece di riusare sempre
  // la prima trovata, altrimenti finirebbero entrambi assegnati alla stessa squadra.
  const usedRows=new Set();
  people.forEach(name=>{
    const pill=document.createElement('span');
    pill.style.cssText='display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:var(--soft);border-radius:999px;padding:4px 8px;font-size:12px;font-weight:700';
    if(withImages){
      // Quando non c'è una squadra unica certa (teamHint vuoto) ma conosciamo le due
      // squadre della partita (candidateTeams), restringiamo il match a quelle per
      // evitare di prendere il logo di un omonimo di un'altra partita/giornata.
      const team=teamHint
        ? teamForPersonToken(name,teamHint,contextRows,usedRows)
        : teamForPersonTokenAmongTeams(name,candidateTeams,contextRows,usedRows);
      if(team){
        const logo=imgOrInitialEl('team',team,'mini-logo');
        logo.title=team;
        logo.alt=team;
        pill.appendChild(logo);
      } else {
        pill.appendChild(roleFallbackElForPerson(name,contextRows));
      }
    }
    const t=document.createElement('button'); t.type='button'; t.className='player-link'; t.textContent=name; t.title='Apri scheda giocatore';
    t.onclick=(ev)=>{ ev.stopPropagation(); openPlayerProfile(name); };
    pill.appendChild(t); list.appendChild(pill);
  });
  row.appendChild(list); parent.appendChild(row);
}
function resultText(r){
  const direct=firstPresent(r,[['risultato','score']]);
  if(direct) return direct;
  const gh=firstPresent(r,[['gol casa','reti casa','goal casa','gc','gol squadra casa']]);
  const ga=firstPresent(r,[['gol trasferta','reti trasferta','goal trasferta','gt','gol squadra trasferta']]);
  if(String(gh||'').trim() || String(ga||'').trim()) return (gh||'0')+' - '+(ga||'0');
  return '-';
}
function esitoText(r){ return firstPresent(r,[['esito','vincitore','outcome']]); }
function goalsFromResult(res){
  const nums=String(res||'').match(/\d+/g)||[];
  return nums.length>=2 ? nums.slice(0,2).reduce((s,x)=>s+parseInt(x,10),0) : 0;
}
function filteredRiepilogoRows(rows,file){
  const selected=state.selectedRiepilogoGiornata;
  return filterRows(rows.filter(r=>!selected || rowGiornataKey(r,file)===selected));
}
function statValue(stats,names){
  for(const r of stats){
    const k=firstPresent(r,[['statistica','voce','dato','nome','metrica','campo']]) || Object.values(r)[0];
    if(names.some(n=>norm(k).includes(norm(n)))){
      return firstPresent(r,[['valore','value','totale','numero']]) || Object.values(r)[1] || '';
    }
  }
  return '';
}
function riepilogoScorerPhotoEl(value){
  const name=cleanPersonTokenForImage(value);
  const img=document.createElement('img');
  img.className='riepilogo-kpi-scorer-photo';
  img.alt=name||'Miglior marcatore';
  img.decoding='async';
  img.loading='lazy';
  if(!name) return img;
  const key=norm(name);
  const candidates=[];
  const add=(src)=>{ if(src && !candidates.includes(src)) candidates.push(src); };
  add(imageFor('player',name));
  ['immagini/giocatori/','data/immagini/giocatori/'].forEach(prefix=>{
    imageExts().forEach(ext=>add(prefix+key+'.'+ext));
  });

  const cached=cachedResolvedImage('player',[name]);
  if(cached){
    img.src=cached;
    img.classList.add('is-loaded');
    return img;
  }
  if(cached===null) return img;

  // Anche qui niente retry sequenziale: risolvi una volta la candidata valida
  // e memorizzala, così il KPI non lampeggia quando rientri nel tab Riepilogo.
  probeFirstWorkingImage(candidates).then(src=>{
    rememberResolvedImage('player',[name],src);
    if(!src || !img.isConnected) return;
    img.onload=()=>img.classList.add('is-loaded');
    img.onerror=()=>img.classList.remove('is-loaded');
    img.src=src;
  });
  return img;
}

function riepilogoGoalNumberFromText(value){
  const text=String(value||'').trim();
  if(!text) return null;
  if(/^[-+]?\d+(?:[,.]\d+)?$/.test(text)) return num(text);
  const patterns=[
    /(?:^|\s)(?:x|×)\s*(\d+(?:[,.]\d+)?)(?=\s|$)/i,
    /\(\s*(\d+(?:[,.]\d+)?)\s*(?:gol|goal|reti?)?\s*\)/i,
    /(\d+(?:[,.]\d+)?)\s*(?:gol|goal|reti?)\b/i,
    /\b(?:gol|goal|reti?)\s*(\d+(?:[,.]\d+)?)/i,
    /[:=\-]\s*(\d+(?:[,.]\d+)?)\s*$/,
    /\s+(\d+(?:[,.]\d+)?)\s*$/
  ];
  for(const re of patterns){
    const m=text.match(re);
    if(m) return num(m[1]);
  }
  return null;
}
function cleanRiepilogoScorerName(value){
  return cleanPersonTokenForImage(String(value||'')
    .replace(/\(\s*\d+(?:[,.]\d+)?\s*(?:gol|goal|reti?)?\s*\)/ig,'')
    .replace(/\b(?:x|×)\s*\d+(?:[,.]\d+)?\b/ig,'')
    .replace(/\b\d+(?:[,.]\d+)?\s*(?:gol|goal|reti?)\b/ig,'')
    .replace(/\b(?:gol|goal|reti?)\s*\d+(?:[,.]\d+)?\b/ig,'')
    .replace(/[:=\-]\s*\d+(?:[,.]\d+)?\s*$/,'')
    .replace(/\s+\d+(?:[,.]\d+)?\s*$/,'')
    .trim());
}
function riepilogoSplitScorerTokens(value){
  return String(value||'')
    .split(/\s*(?:\n|\r|\||,|;|\+|\/|\s+-\s+)\s*/)
    .map(x=>smartSpace(x))
    .filter(Boolean);
}
function riepilogoAddScore(map,name,goals){
  const clean=cleanRiepilogoScorerName(name);
  const tokenKey=personMatchKey(clean);
  const g=Number(goals);
  if(!clean || !tokenKey || !Number.isFinite(g) || g<=0) return false;
  // Se il token identifica in modo univoco un giocatore della rosa, usa la sua identità.
  // Se invece è ambiguo (es. solo cognome condiviso), resta come token non assegnabile
  // a una scheda specifica: così non somma gol a omonimi.
  const rec=uniqueRosterRecordForPersonToken(clean);
  const key=rec ? ('player:'+rec.identityKey) : ('token:'+tokenKey);
  const current=map.get(key) || {name:clean, goals:0, identityKey:rec?.identityKey||''};
  current.goals += g;
  map.set(key,current);
  return true;
}
function riepilogoGoalValueFromRow(row){
  const keys=Object.keys(row||{});
  const exactNames=['gol giornata','goal giornata','reti giornata','gol','goal','reti','numero gol','n gol','n. gol','n° gol','totale gol','totale goal','totale reti','gol totali','goal totali','reti totali','marcature','conteggio','totale','valore','value'];
  for(const n of exactNames){
    const k=keys.find(x=>norm(x)===norm(n));
    if(k && String(row[k]||'').trim()) return row[k];
  }
  // Fallback controllato: accetta colonne che parlano esplicitamente di gol/reti del marcatore,
  // ma evita gol casa/trasferta e risultato partita.
  const k=keys.find(x=>{
    const nk=norm(x);
    if(nk.includes('casa') || nk.includes('trasferta') || nk.includes('ospite') || nk.includes('risultato') || nk.includes('score')) return false;
    return (nk.includes('gol') || nk.includes('goal') || nk.includes('reti')) && (nk.includes('marcatore') || nk.includes('giocatore') || nk.includes('giornata') || nk.includes('totale'));
  });
  return k ? row[k] : '';
}
function riepilogoSourceValues(row,mode){
  const keys=Object.keys(row||{});
  const values=[];
  const seen=new Set();
  const add=(v)=>{
    const text=String(v||'').trim();
    const key=norm(text);
    if(!text || !key || seen.has(key)) return;
    seen.add(key); values.push(text);
  };
  const nome=exactVal(row,['nome']);
  const cognome=exactVal(row,['cognome']);
  if(nome || cognome) add(uniqueNameParts([nome,cognome]));

  const directNames=['giocatore','marcatore','calciatore','player','nome giocatore','nome completo','cognome e nome','autore','autorete'];
  directNames.forEach(n=>{
    const k=keys.find(x=>norm(x)===norm(n));
    if(k) add(row[k]);
  });

  keys.forEach(k=>{
    const nk=norm(k);
    if(['sezione','giornata','turno','round','squadra','team','club','note','data','giorno','risultato','score'].includes(nk)) return;
    if(nk.includes('squadra') || nk.includes('team') || nk.includes('giornata') || nk.includes('risultato')) return;

    if(mode==='totali'){
      // Nei CSV piatti dei riepiloghi i totali spesso sono: Sezione=Totale marcatore giornata, Statistica=Nome, Valore=Gol.
      if(['statistica','voce','dato','etichetta','nome','giocatore','marcatore','player'].includes(nk) || nk.includes('nomegiocatore') || nk.includes('marcatore')) add(row[k]);
    } else {
      if(nk==='giocatore' || nk==='marcatore' || nk==='player' || nk==='calciatore' ||
         nk.includes('nomegiocatore') || nk.includes('nomecompleto') || nk.includes('cognomeenome') ||
         nk.includes('marcatore') || nk.includes('marcatori') || nk.includes('scorer')) add(row[k]);
    }
  });
  return values;
}
function riepilogoScoresFromRows(rows,mode){
  const totals=new Map();
  let explicitCount=0;
  for(const row of (rows||[])){
    const values=riepilogoSourceValues(row,mode);
    if(!values.length) continue;
    const explicitGoals=riepilogoGoalNumberFromText(riepilogoGoalValueFromRow(row));
    if(mode==='totali' && explicitGoals===null) continue;

    const rawTokens=[];
    values.forEach(value=>riepilogoSplitScorerTokens(value).forEach(token=>rawTokens.push(token)));
    if(!rawTokens.length) continue;

    if(explicitGoals!==null && rawTokens.length===1){
      if(riepilogoAddScore(totals,rawTokens[0],explicitGoals)) explicitCount++;
      continue;
    }

    rawTokens.forEach(token=>{
      const tokenGoals=riepilogoGoalNumberFromText(token);
      const goals=tokenGoals!==null ? tokenGoals : 1;
      if(riepilogoAddScore(totals,token,goals) && tokenGoals!==null) explicitCount++;
    });
  }
  return {totals,explicitCount};
}
function riepilogoScoresFromPartite(partite){
  const totals=new Map();
  let explicitCount=0;
  for(const row of (partite||[])){
    const fields=[
      firstPresent(row,[['marcatori casa','marcatori squadra casa','gol casa marcatori','scorer casa','marcatori home']]),
      firstPresent(row,[['marcatori trasferta','marcatori ospite','marcatori squadra trasferta','gol trasferta marcatori','scorer trasferta','marcatori away']]),
      firstPresent(row,[['marcatori','scorers','reti']]),
      extractInlineField(firstPresent(row,[['note','commento','descrizione']]),'Marcatori')
    ];
    fields.filter(Boolean).forEach(value=>{
      riepilogoSplitScorerTokens(value).forEach(token=>{
        const tokenGoals=riepilogoGoalNumberFromText(token);
        const goals=tokenGoals!==null ? tokenGoals : 1;
        if(riepilogoAddScore(totals,token,goals) && tokenGoals!==null) explicitCount++;
      });
    });
  }
  return {totals,explicitCount};
}
function riepilogoTopScorerLabelFromScores(scoreData){
  const scorers=[...(scoreData?.totals||new Map()).values()].filter(x=>Number.isFinite(x.goals) && x.goals>0);
  if(!scorers.length) return '';
  const maxGoals=Math.max(...scorers.map(x=>x.goals));
  const top=scorers.filter(x=>x.goals===maxGoals);
  if(top.length>1) return 'Pari merito tra '+top.length+' giocatori';
  const goalText=Number.isInteger(maxGoals) ? String(maxGoals) : String(maxGoals).replace('.',',');
  return top[0].name+(goalText ? ' ('+goalText+' gol)' : '');
}
function riepilogoTopScorerLabel(partite, marcatori, totaliMarcatori){
  // 1) Preferisce i totali solo se hanno un numero gol esplicito.
  // 2) Poi usa i marcatori della giornata, contando anche nomi ripetuti nella stessa cella.
  // 3) Infine ricade sui marcatori scritti direttamente nelle partite.
  const sources=[
    riepilogoScoresFromRows(totaliMarcatori||[],'totali'),
    riepilogoScoresFromRows(marcatori||[],'marcatori'),
    riepilogoScoresFromPartite(partite||[])
  ];
  for(const source of sources){
    const label=riepilogoTopScorerLabelFromScores(source);
    if(label) return label;
  }
  return '';
}
function deriveStats(partite, marcatori, stats, totaliMarcatori){
  const partiteGiocate=statValue(stats,['partite giocate','partite']) || partite.length;
  const golTotali=statValue(stats,['gol totali','goal totali']) || partite.reduce((s,r)=>s+goalsFromResult(resultText(r)),0);
  const media=statValue(stats,['media gol','media goal']) || (partiteGiocate? (Number(golTotali)/Number(partiteGiocate)).toFixed(2).replace('.',',') : '');
  const clean=statValue(stats,['clean sheet','cleansheet']) || partite.reduce((s,r)=>{
    const nums=String(resultText(r)).match(/\d+/g)||[];
    return s + (nums.slice(0,2).filter(x=>parseInt(x,10)===0).length);
  },0);
  let maxMatch=statValue(stats,['partita con più gol','partita con piu gol']);
  if(!maxMatch && partite.length){
    const best=[...partite].sort((a,b)=>goalsFromResult(resultText(b))-goalsFromResult(resultText(a)))[0];
    const casa=firstPresent(best,[['squadra casa','casa','home','squadra 1','team casa']]);
    const trasferta=firstPresent(best,[['squadra trasferta','trasferta','ospite','away','squadra 2','team trasferta']]);
    maxMatch=[casa,trasferta].filter(Boolean).join(' - ')+' ('+resultText(best)+')';
  }
  // Ricalcola il miglior marcatore dai marcatori della giornata: la riga statistica
  // precompilata viene usata solo come fallback se non ci sono dati marcatori leggibili.
  let migliorMarcatore=riepilogoTopScorerLabel(partite,marcatori,totaliMarcatori) || statValue(stats,['miglior marcatore','top scorer']);
  return [
    ['Partite giocate',partiteGiocate],
    ['Gol totali',golTotali],
    ['Media gol',media],
    ['Clean sheet',clean],
    ['Partita con più gol',maxMatch],
    ['Miglior marcatore',migliorMarcatore]
  ].filter(x=>String(x[1]||'').trim()!=='' && x[1]!==0);
}

function riepilogoStatisticheWithTopScorerTie(stats,partite,marcatori,totaliMarcatori){
  const topScorerLabel=riepilogoTopScorerLabel(partite,marcatori,totaliMarcatori);
  if(!topScorerLabel || !norm(topScorerLabel).startsWith('parimeritotra')) return stats||[];

  const rows=(stats||[]).map(r=>({...r}));
  const isStatNameKey=k=>['statistica','voce','dato','nome','metrica','campo'].some(n=>norm(k)===norm(n)||norm(k).includes(norm(n)));
  const isValueKey=k=>['valore','value','totale','numero'].some(n=>norm(k)===norm(n)||norm(k).includes(norm(n)));
  const findKey=(obj,predicate,fallback)=>Object.keys(obj||{}).find(predicate)||fallback;
  const isTopScorerRow=r=>{
    const label=firstPresent(r,[['statistica','voce','dato','nome','metrica','campo']]) || Object.values(r||{})[0] || '';
    const key=norm(label);
    return key.includes('migliormarcatore') || key.includes('topscorer');
  };

  let target=rows.find(isTopScorerRow);
  if(target){
    const valueKey=findKey(target,isValueKey,Object.keys(target)[1]||'Valore');
    target[valueKey]=topScorerLabel;
    return rows;
  }

  const sample=rows[0] || {};
  const statKey=findKey(sample,isStatNameKey,'Statistica');
  const valueKey=findKey(sample,isValueKey,'Valore');
  const sectionKey=findKey(sample,k=>norm(k)==='sezione','');
  const dayKey=findKey(sample,k=>['giornata','turno','round'].includes(norm(k)),'');
  const source=[...(stats||[]),...(partite||[]),...(marcatori||[]),...(totaliMarcatori||[])].find(r=>r&&Object.keys(r).length) || {};
  const added={};
  if(sectionKey) added[sectionKey]='Statistica';
  if(dayKey && source[dayKey]) added[dayKey]=source[dayKey];
  added[statKey]='Miglior marcatore';
  added[valueKey]=topScorerLabel;
  rows.push(added);
  return rows;
}
function renderKpiGrid(parent, items){
  if(!items.length) return;
  const priority=['partite giocate','gol totali','media gol','clean sheet','miglior marcatore','partita con più gol','partita con piu gol'];
  const ordered=[...items].sort((a,b)=>{
    const ai=priority.findIndex(x=>norm(a[0]).includes(norm(x)));
    const bi=priority.findIndex(x=>norm(b[0]).includes(norm(x)));
    return (ai<0?99:ai)-(bi<0?99:bi);
  });
  const grid=document.createElement('div'); grid.className='riepilogo-kpi-grid';
  ordered.forEach(([label,value])=>{
    const c=document.createElement('div');
    const isMatchMax=norm(label).includes('partitaconpiugol') || norm(label).includes('partitaconpiugoal');
    const isScorer=norm(label).includes('migliormarcatore');
    const isTieScorer=isScorer && norm(value).startsWith('parimeritotra');
    const isWide=String(value||'').length>18 || isScorer;
    c.className='card stat riepilogo-kpi'+(isWide?' is-wide':'')+(isMatchMax?' is-match-max':'')+((isScorer&&!isTieScorer)?' is-scorer':'');
    const textWrap=document.createElement('div');
    textWrap.className='riepilogo-kpi-text';
    const n=document.createElement('div'); n.className='n'; n.textContent=fixItalianAccents(value);
    const l=document.createElement('div'); l.className='l'; l.textContent=fixItalianAccents(label);
    textWrap.appendChild(n); textWrap.appendChild(l);
    c.appendChild(textWrap);
    if(isScorer && !isTieScorer) c.appendChild(riepilogoScorerPhotoEl(value));
    grid.appendChild(c);
  });
  parent.appendChild(grid);
}
function objectsToRows(objs){
  if(!objs.length) return [];
  const allHeaders=[...new Set(objs.flatMap(o=>Object.keys(o).filter(k=>!/^_/.test(k))))];
  // Mostra solo colonne realmente valorizzate almeno in una riga.
  // Nei CSV riepilogo molte colonne sono presenti nell'header globale ma vuote
  // per quella sezione specifica; nasconderle rende le tabelle leggibili.
  const headers=allHeaders.filter(h=>objs.some(o=>String(o[h]??'').trim()!==''));
  if(!headers.length) return [];
  return [headers,...objs.map(o=>headers.map(h=>o[h]??''))];
}

function teamNameFromMatchRow(r, names){
  return firstPresent(r,[names]) || '';
}
function parseTeamsFromPartitaText(text){
  const raw=String(text||'').trim();
  if(!raw) return [];
  const parts=raw.split(/\s+(?:-|–|—|vs\.?|contro)\s+/i).map(x=>teamDisplayNameForChart(x)).filter(Boolean);
  return parts.length>=2 ? [parts[0],parts.slice(1).join(' - ')] : [];
}
function opponentForFavoredTeam(favoredTeam, autogoalRow, partite){
  const favored=teamDisplayNameForChart(favoredTeam);
  if(!favored) return '';
  const favoredKey=norm(favored);

  // Prima prova dal campo "Partita" della riga autogoal, se presente.
  const matchText=firstPresent(autogoalRow,[['partita','match','gara','incontro']]);
  const parsed=parseTeamsFromPartitaText(matchText);
  if(parsed.length>=2){
    const a=parsed[0], b=parsed[1];
    if(norm(a)===favoredKey) return b;
    if(norm(b)===favoredKey) return a;
  }

  // Poi prova dalle partite della stessa giornata: nel CSV la squadra in Autogol
  // indica chi ha beneficiato dell'autorete; per mostrare chi l'ha fatta serve l'avversaria.
  const day=String(firstPresent(autogoalRow,[['giornata','turno','round']])||'').trim();
  const candidates=partite.filter(p=>{
    const pd=String(firstPresent(p,[['giornata','turno','round']])||'').trim();
    if(day && pd && day!==pd) return false;
    const casa=firstPresent(p,[['squadra casa','casa','home','squadra 1','team casa']]);
    const trasferta=firstPresent(p,[['squadra trasferta','trasferta','ospite','away','squadra 2','team trasferta']]);
    return norm(casa)===favoredKey || norm(trasferta)===favoredKey;
  });
  if(candidates.length===1){
    const p=candidates[0];
    const casa=firstPresent(p,[['squadra casa','casa','home','squadra 1','team casa']]);
    const trasferta=firstPresent(p,[['squadra trasferta','trasferta','ospite','away','squadra 2','team trasferta']]);
    if(norm(casa)===favoredKey) return trasferta;
    if(norm(trasferta)===favoredKey) return casa;
  }
  return '';
}
function autogoalRowsForDisplay(rows, partite){
  return rows.map(r=>{
    const out={...r};
    const favored=firstPresent(r,[['squadra','team','squadra beneficiaria','a favore di']]);
    const ownTeam=opponentForFavoredTeam(favored,r,partite);
    if(ownTeam){
      // Sostituisce la squadra indicata dal CSV, che è quella favorita dall'evento,
      // con la squadra del giocatore/autorete, cioè l'informazione utile in tabella.
      const key=Object.keys(out).find(k=>['squadra','team'].includes(norm(k))) || 'Squadra';
      out[key]=ownTeam;
    }
    return out;
  });
}

/* ══════════════════════════════════
   CARICAMENTO FILE
   ══════════════════════════════════ */
/* fresh=true forza un bypass della cache del browser/CDN (usato solo dal pulsante
   "Aggiorna dati"). Nei caricamenti normali NON aggiungiamo alcun cache-buster:
   così il browser e la CDN di GitHub Pages possono servire i CSV dalla cache,
   invece di riscaricare tutto a ogni visita. */
async function fetchText(path,fresh){
  const bust=fresh?('?t='+Date.now()):'';
  try{ const r=await fetch('data/'+path+bust); if(r.ok) return await r.text(); }catch(e){}
  const r2=await fetch(path+bust);
  if(!r2.ok) throw new Error(path);
  return await r2.text();
}

async function loadAuto(fresh){
  setStatus('Caricamento in corso…');
  state.files={}; state.rows={}; loadErrors=[]; state.imagesReady=true;
  clearImageProbeCache();
  clearDerivedDataCaches();
  invalidateHeroLogo();

  // Avvia SUBITO i CSV base noti nel codice, incluso manifest.csv.
  // Prima si aspettava manifest.csv e solo dopo partivano classifica/marcatori/calendario:
  // così si pagava un giro di rete in più sul percorso critico del primo caricamento.
  const defaultCsvList=[...new Set(DEFAULT_FILES.filter(x=>/\.csv$/i.test(x)))];
  const defaultFetches=new Map(defaultCsvList.map(f=>[
    f,
    fetchText(f,fresh)
      .then(txt=>({status:'fulfilled',value:{f,txt}}))
      .catch(reason=>({status:'rejected',reason,f}))
  ]));

  let list=[...DEFAULT_FILES];
  const manifestResult=await defaultFetches.get('manifest.csv');
  if(manifestResult && manifestResult.status==='fulfilled'){
    const mt=manifestResult.value.txt;
    const mr=parseCsv(mt);
    const objs=rowsToObjects(mr);
    const files=objs.length?objs.map(o=>col(o,['file','nome','filename'])).filter(Boolean):mr.flat().filter(x=>x&&x.toLowerCase()!=='file');
    list=[...new Set([...list,...files])];
    state.rows['manifest.csv']=mr; state.files['manifest.csv']=mt;
  }

  /* Tutti i CSV vengono richiesti in parallelo. I CSV base erano già in volo
     mentre attendevamo il manifest; qui aggiungiamo solo eventuali extra trovati
     nel manifest e aspettiamo il completamento di tutto. */
  const csvList=[...new Set(list.filter(x=>/\.csv$/i.test(x) && !state.rows[x]))];
  const results=await Promise.all(csvList.map(f=>{
    const started=defaultFetches.get(f);
    return started || fetchText(f,fresh)
      .then(txt=>({status:'fulfilled',value:{f,txt}}))
      .catch(reason=>({status:'rejected',reason,f}));
  }));
  let ok=0;
  results.forEach((res,i)=>{
    const f=csvList[i];
    if(res.status==='fulfilled'){
      state.files[f]=res.value.txt; state.rows[f]=parseCsv(res.value.txt); ok++;
    }else{
      // I file di riepilogo possono essere già presenti nel manifest anche se
      // non esistono ancora perché il torneo è in corso: non mostrarli come alert.
      if(!DEFAULT_FILES.includes(f) && fileKind(f)!=='riepilogo') loadErrors.push(f+' — non trovato');
    }
  });
  /* Se nel frattempo l'utente ha già caricato manualmente una cartella (es. ha cliccato
     "Seleziona cartella" prima che l'autoload finisse), questo risultato è superato:
     non sovrascrivere i dati più recenti già mostrati. */
  if(manualLoadActive) return;
  applyConfig(); showErrors(); renderAll(); tryLoadLogo(); warmPlayerProfileCaches();
  if(ok || state.rows['manifest.csv']) setStatus(dataLoadStatus(ok+(state.rows['manifest.csv']?1:0)),true);
  else setStatus('Autocaricamento bloccato — usa Seleziona cartella');
}

/* File System Access API (Chrome 86+) con fallback al picker classico */
async function tryDirectoryPicker(){
  if('showDirectoryPicker' in window){
    try{
      const dir=await window.showDirectoryPicker({mode:'read'});
      await loadFromDirectoryHandle(dir);
      return true;
    }catch(e){ if(e.name==='AbortError') return true; /* utente ha annullato */ }
  }
  return false;
}
/* Scansiona una cartella ricorsivamente, raccogliendo CSV e immagini a qualsiasi profondità.
   pathPrefix accumula il percorso relativo (es. "immagini/squadre") usato come chiave per imageURLs. */
async function scanDirRecursive(dirHandle, pathPrefix=''){
  for await(const [name,handle] of dirHandle.entries()){
    const relPath = pathPrefix ? pathPrefix+'/'+name : name;
    if(handle.kind==='file'){
      try{
        const file=await handle.getFile();
        await ingestPickedFile(file, relPath, name);
      }catch(e){
        loadErrors.push(relPath+' — errore di lettura sul dispositivo');
      }
    } else if(handle.kind==='directory'){
      try{ await scanDirRecursive(handle, relPath); }catch(e){}
    }
  }
}

/* Timeout generico: su Chrome/file:// alcuni file dentro cartelle selezionate possono
   restare in pending. Non devono bloccare tutto il torneo. */
function withTimeout(promise, ms, label){
  let t;
  const timeout=new Promise((_,reject)=>{
    t=setTimeout(()=>reject(new Error((label||'Operazione')+' scaduta dopo '+ms+' ms')),ms);
  });
  return Promise.race([promise,timeout]).finally(()=>clearTimeout(t));
}

async function safeFileText(file, relPath){
  // Prima via moderna, più veloce; timeout breve per non restare appesi.
  try{ return await withTimeout(file.text(), 2500, relPath||file.name); }
  catch(e1){
    // Fallback FileReader con timeout: utile su alcune combinazioni Chrome + disco di rete/lettera Z:.
    return await withTimeout(new Promise((resolve,reject)=>{
      const rd=new FileReader();
      rd.onload=()=>resolve(String(rd.result||''));
      rd.onerror=()=>reject(rd.error||new Error('FileReader error'));
      rd.readAsText(file,'UTF-8');
    }), 2500, relPath||file.name);
  }
}

/* Lettura robusta per Chrome: immagini senza await, CSV con timeout e fallback. */
async function ingestPickedFile(file, relPath, basename){
  const name=basename||file.name;
  if(/\.(jpg|jpeg|png)$/i.test(name)){
    rememberImage(relPath||name,file);
    state._imgCount=(state._imgCount||0)+1;
    return true;
  }
  if(!/\.csv$/i.test(name)) return false;
  const txt=await safeFileText(file, relPath||name);
  // La chiave resta il nome file puro (senza percorso) per compatibilità con fileKind/sectionFiles.
  // Se esistono duplicati con stesso nome in sottocartelle diverse, l'ultimo letto vince.
  state.files[name]=txt;
  state.rows[name]=parseCsv(txt);
  clearDerivedDataCaches();
  state._csvCount=(state._csvCount||0)+1;
  return true;
}

function refreshAfterManualLoad(csv,img){
  clearDerivedDataCaches();
  applyConfig();
  showErrors();

  // Ricostruzione esplicita della UI. Non ci affidiamo solo a renderAll(): in Chrome,
  // dopo il file/directory picker, il primo repaint può essere saltato finché non cambi tab.
  updateTitle();
  renderTabs();
  document.querySelectorAll('.section').forEach(s=>s.classList.toggle('active',s.id===state.activeTab));
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===state.activeTab));
  renderActiveSection();

  tryLoadLogo();
  warmPlayerProfileCaches();
  if(csv>0) setStatus(dataLoadStatus(csv),true);
  else setStatus(`Nessun CSV trovato nella cartella selezionata (${img} immagini). Seleziona la cartella principale del torneo o la cartella che contiene i CSV.`);

  const forcePass=()=>{
    // Forza reflow + ridisegno + resize, equivalente al cambio scheda ma automatico.
    document.body.offsetHeight;
    renderActiveSection();
    tryLoadLogo();
    if(document.getElementById('chartMarcatori') || document.getElementById('chartPunti')){
      scheduleHomeChartsRender();
    }
    window.dispatchEvent(new Event('resize'));
  };

  requestAnimationFrame(()=>requestAnimationFrame(forcePass));
  setTimeout(forcePass,50);
  setTimeout(forcePass,200);
}

async function loadFromDirectoryHandle(dir){
  manualLoadActive = true;
  state.files={}; state.rows={}; state.imageURLs={}; state.imageAliases={}; loadErrors=[]; state.imagesReady=false;
  clearImageProbeCache();
  clearDerivedDataCaches();
  invalidateHeroLogo();
  state._csvCount=0; state._imgCount=0;
  setStatus('Caricamento cartella…');
  await scanDirRecursive(dir);
  state.imagesReady=true;
  refreshAfterManualLoad(state._csvCount,state._imgCount);
}

function processImageFilesLater(imageFiles){
  if(!imageFiles.length){
    state.imagesReady=true;
    forceHomeRefreshPasses();
    return;
  }
  // Le immagini non devono mai bloccare l'aggiornamento dei CSV/Home.
  // Su Chrome con file:// e cartelle su unità Z: alcune PNG possono congelare il picker
  // se elaborate dentro lo stesso flusso dei CSV. Le carichiamo dopo, a piccoli lotti.
  let i=0;
  function step(){
    const start=i;
    while(i<imageFiles.length && i<start+5){
      const file=imageFiles[i++];
      const rel=file.webkitRelativePath||file.name;
      try{
        rememberImage(rel,file);
        state._imgCount=(state._imgCount||0)+1;
      }catch(e){
        loadErrors.push(rel+' — immagine saltata: '+String((e&&e.message)||e||'errore'));
      }
    }
    tryLoadLogo();
    // Aggiorna la sezione attiva così loghi/avatar compaiono senza cambiare tab.
    renderActiveSection();
    if(i<imageFiles.length){
      setStatus(`Caricati ${state._csvCount||0} CSV. Immagini ${i}/${imageFiles.length}…`,true);
      setTimeout(step,0);
    }else{
      state.imagesReady=true;
      showErrors();
      setStatus(dataLoadStatus(state._csvCount||0),true);
      forceHomeRefreshPasses();
    }
  }
  if(imageFiles.length) setTimeout(step,0);
}

function forceHomeRefreshPasses(){
  const forcePass=()=>{
    document.body.offsetHeight;
    renderActiveSection();
    tryLoadLogo();
    if(document.getElementById('chartMarcatori') || document.getElementById('chartPunti')){
      scheduleHomeChartsRender();
    }
    window.dispatchEvent(new Event('resize'));
  };
  forcePass();
  requestAnimationFrame(()=>requestAnimationFrame(forcePass));
  setTimeout(forcePass,50);
  setTimeout(forcePass,200);
}

async function loadFolder(fileList){
  manualLoadActive = true;
  const files=[...fileList]; // snapshot: l'input viene svuotato subito dopo la selezione
  state.files={}; state.rows={}; state.imageURLs={}; state.imageAliases={}; loadErrors=[]; state.imagesReady=false;
  clearImageProbeCache();
  clearDerivedDataCaches();
  invalidateHeroLogo();
  state._csvCount=0; state._imgCount=0;

  if(!files.length){
    setStatus('Nessun file selezionato.');
    return;
  }

  // Separazione netta: i CSV aggiornano subito la pagina; le immagini vengono elaborate dopo.
  // Questo evita il blocco visto in Chrome su file come "outofofficefc.png".
  const csvFiles=files
    .filter(file=>/\.csv$/i.test(file.name))
    .sort((a,b)=>String(a.webkitRelativePath||a.name).localeCompare(String(b.webkitRelativePath||b.name),'it'));
  const imageFiles=files
    .filter(file=>/\.(jpg|jpeg|png)$/i.test(file.name))
    .sort((a,b)=>String(a.webkitRelativePath||a.name).localeCompare(String(b.webkitRelativePath||b.name),'it'));

  if(!csvFiles.length){
    setStatus(`Nessun CSV trovato. Trovate ${imageFiles.length} immagini: seleziona la cartella principale che contiene i CSV, non solo la cartella immagini.`);
    // Carica comunque le immagini, ma non bloccare la UI.
    processImageFilesLater(imageFiles);
    refreshAfterManualLoad(0,0);
    return;
  }

  for(let i=0;i<csvFiles.length;i++){
    const file=csvFiles[i];
    const rel=file.webkitRelativePath||file.name;
    setStatus(`Caricamento CSV… ${i+1}/${csvFiles.length} — ${rel.split('/').pop()}`);
    try{
      const txt=await safeFileText(file, rel);
      state.files[file.name]=txt;
      state.rows[file.name]=parseCsv(txt);
      clearDerivedDataCaches();
      state._csvCount++;
    }catch(e){
      loadErrors.push(rel+' — CSV saltato: '+String((e&&e.message)||e||'errore di lettura'));
    }
    // Aggiorna già durante il caricamento: anche se un file successivo dà problemi, la pagina non resta a zero.
    applyConfig();
    updateTitle();
    renderTabs();
    renderActiveSection();
    if(i%2===0) await new Promise(resolve=>setTimeout(resolve,0));
  }

  // Prima aggiorna definitivamente Home/classifiche con i CSV.
  refreshAfterManualLoad(state._csvCount,0);

  // Poi immagini in background, senza bloccare il refresh dati.
  processImageFilesLater(imageFiles);
}

/* ══════════════════════════════════
   EVENTI
   ══════════════════════════════════ */
document.getElementById('search').addEventListener('input',e=>{
  state.search=e.target.value;
  renderActiveSection(); // solo sezione attiva, non tutto
});

/* ── Avvio ── */
initTheme(); renderTabs(); updateTitle(); tryLoadLogo(); loadAuto();
