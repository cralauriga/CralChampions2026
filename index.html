<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Favicon: icona nella scheda del browser e nei preferiti/segnalibri.
       Usa lo stesso logo del CRAL già presente in immagini/. Se il file
       ha un nome diverso da logo_cral.png, basta cambiare questo percorso.
       Su iOS (preferiti Safari, home screen) serve specificamente
       apple-touch-icon in un formato quadrato pieno (no trasparenza,
       idealmente 180x180px), altrimenti iOS mostra l'iniziale del titolo. -->
  <link rel="icon" type="image/png" href="immagini/logo_cral.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="immagini/logo_cral.png" />
  <link rel="apple-touch-icon" href="immagini/logo_cral.png" />
  <title>CRAL Champions</title>
  <!-- Open Graph: anteprima link su WhatsApp, Telegram, Facebook ecc.
       Letti dai crawler senza eseguire JavaScript, quindi i valori restano fissi
       (non vengono presi dal config.csv, che è dinamico). Nessun riferimento
       all'anno/edizione per non doverli aggiornare a ogni torneo. -->
  <meta property="og:title" content="CRAL Champions" />
  <meta property="og:description" content="Classifiche, calendario, risultati e statistiche giocatori del torneo aziendale CRAL Champions" />
  <meta property="og:image" content="https://cralauriga.github.io/CralChampions2026/immagini/logo_cral.png" />
  <meta property="og:url" content="https://cralauriga.github.io/CralChampions2026/" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <!-- Preconnect: risparmia DNS/TLS quando Chart.js viene richiesto al volo nella Home -->
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <!-- Font: Oswald per titoli/hero/tab (stile scoreboard sportivo), Inter per corpo testo e tabelle (leggibilità e cifre tabellari allineate) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <!-- Preload: il browser inizia a scaricare il file più critico (manifest) subito,
       in parallelo col parsing dell'HTML, invece di aspettare che lo script in fondo
       alla pagina venga eseguito ed esegua la fetch() -->
  <link rel="preload" href="data/manifest.csv" as="fetch">
  <style>
    /* ── Tema chiaro ── */
    :root {
      --bg:#eef3f9;--panel:#fff;--ink:#142033;--muted:#667085;--line:#dbe5f2;
      --blue:#0f5aa8;--dark:#071d3a;--soft:#f3f7fc;--gold:#f5b942;
      --green:#12805c;--red:#b42318;--shadow:rgba(7,29,58,.10);
    }
    /* ── Tema scuro ── */
    [data-theme="dark"] {
      --bg:#0d1520;--panel:#162033;--ink:#e2eaf5;--muted:#8fa4be;--line:#243450;
      --blue:#3b82f6;--dark:#0a1628;--soft:#1a2d47;--gold:#f5b942;
      --green:#34d399;--red:#f87171;--shadow:rgba(0,0,0,.35);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:'Inter',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--ink);transition:background .3s,color .3s}
    .wrap{max-width:1280px;margin:auto;padding:24px}
    /* ── Hero ── */
    .hero{background:linear-gradient(135deg,var(--dark),var(--blue));color:#fff;border-radius:26px;padding:30px;margin-bottom:18px;box-shadow:0 14px 36px var(--shadow)}
    .hero-top{display:flex;gap:20px;align-items:center}
    .hero-logo{width:72px;height:72px;border-radius:18px;object-fit:contain;background:rgba(255,255,255,.12);padding:6px;flex:0 0 auto;display:flex;align-items:center;justify-content:center}
    .hero-logo img{width:100%;height:100%;object-fit:contain;border-radius:12px}
    .hero-logo svg{width:100%;height:100%}
    .hero h1{margin:0;font-size:clamp(24px,4vw,48px);letter-spacing:.02em;font-family:'Oswald',Arial,Helvetica,sans-serif}
    .hero p{margin:8px 0 0;color:#dbeaff;font-size:17px}
    /* ── Banner errore avanzato ── */
    .err-section{margin:6px 0 0}
    .err-section summary{cursor:pointer;font-weight:700;padding:4px 0;list-style:none}
    .err-section summary::before{content:'▶ ';font-size:11px}
    .err-section[open] summary::before{content:'▼ '}
    .err-item{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #fecaca;font-size:13px;font-weight:400;align-items:flex-start}
    .err-item:last-child{border-bottom:0}
    .err-icon{flex:0 0 18px;text-align:center}
    .err-detail{color:#6b2020}
    .err-fix{margin-top:3px;color:#7c3030;font-style:italic}
    /* ── Toolbar ── */
    .toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px;align-items:center}
    .btn,.fileLabel{border:0;border-radius:14px;padding:11px 15px;background:#fff;color:#0f376f;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;gap:8px;align-items:center;font-size:14px}
    .btn.secondary{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.28)}
    .btn.icon-btn{padding:10px 12px;background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.28);border-radius:14px;font-size:18px;line-height:1}
    input[type=file]{display:none}
    /* ── Banner errore ── */
    #errorBanner{display:none;background:#fef2f2;border:1px solid #fecaca;border-radius:14px;padding:14px 18px;margin-bottom:14px;color:var(--red);font-weight:600}
    #errorBanner ul{margin:6px 0 0 18px;font-weight:400;font-size:13px}
    /* ── Status ── */
    .status{font-size:13px;color:#dbeaff;margin-left:auto}
    /* ── Tabs ── */
    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0}
    .tab{border:1px solid var(--line);background:var(--panel);border-radius:999px;padding:10px 14px;cursor:pointer;font-weight:700;color:var(--blue);transition:background .15s,color .15s;font-family:'Oswald',Arial,Helvetica,sans-serif}
    .tab.active{background:var(--blue);color:#fff;border-color:var(--blue)}
    /* ── Grid ── */
    .grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:16px;box-shadow:0 8px 22px var(--shadow)}
    .stat .n{font-size:34px;font-weight:800;color:var(--blue)}
    .stat .l{color:var(--muted);font-size:13px;text-transform:uppercase;font-weight:800}
    /* ── Sezioni ── */
    .section{display:none}.section.active{display:block}
    h2{margin:0 0 14px;color:var(--blue);font-size:26px;font-family:'Oswald',Arial,Helvetica,sans-serif}
    .upper{text-transform:uppercase}
    .hint{color:var(--muted);font-size:14px;line-height:1.5}
    /* ── Ricerca ── */
    .search{width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:14px;margin:0 0 14px;font-size:15px;background:var(--panel);color:var(--ink)}
    /* ── Tabelle ── */
    /* Le colonne importanti (posizione, nome, valore principale) restano sempre
       leggibili per intero e fisse a sinistra; il resto si legge scorrendo verso
       destra: .tableWrap diventa scrollabile invece di schiacciare ogni colonna
       nello schermo (niente più sigle illeggibili tipo "P.." o "9..."). */
    .tableWrap{position:relative;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior-x:contain;border-radius:16px;border:1px solid var(--line);background:var(--panel)}
    table{width:100%;border-collapse:collapse}
    th,td{padding:10px 13px;border-bottom:1px solid var(--line);text-align:left;white-space:nowrap}
    table.tbl-aligned th,table.tbl-aligned td{overflow:hidden;text-overflow:ellipsis}
    table.tbl-aligned th[data-col-role=rank],table.tbl-aligned td[data-col-role=rank]{min-width:46px;max-width:60px;text-align:center}
    table.tbl-aligned th[data-col-role=metric],table.tbl-aligned td[data-col-role=metric]{min-width:54px;max-width:80px;text-align:center;font-variant-numeric:tabular-nums}
    table.tbl-aligned th[data-col-role=round],table.tbl-aligned td[data-col-role=round]{min-width:64px;max-width:100px;text-align:center}
    table.tbl-aligned th[data-col-role=team],table.tbl-aligned td[data-col-role=team],
    table.tbl-aligned th[data-col-role=person],table.tbl-aligned td[data-col-role=person]{min-width:130px;max-width:220px}
    table.tbl-aligned th[data-col-role=date],table.tbl-aligned td[data-col-role=date]{min-width:84px;max-width:120px}
    table.tbl-aligned th[data-col-role=match],table.tbl-aligned td[data-col-role=match]{min-width:150px;max-width:230px}
    table.tbl-aligned th[data-col-role=section],table.tbl-aligned td[data-col-role=section]{min-width:100px;max-width:160px}
    table.tbl-aligned th[data-col-role=note],table.tbl-aligned td[data-col-role=note]{min-width:130px;max-width:230px}
    table.tbl-aligned th[data-col-role=text],table.tbl-aligned td[data-col-role=text]{min-width:90px;max-width:170px}
    th{background:var(--soft);font-size:12px;text-transform:none;color:var(--muted);cursor:pointer;user-select:none;position:relative}
    th:hover{background:var(--line)}
    th .sort-arrow{margin-left:4px;opacity:.4;font-style:normal}
    th.sort-asc .sort-arrow,th.sort-desc .sort-arrow{opacity:1}
    th.sort-asc .sort-arrow::after{content:'▲'}
    th.sort-desc .sort-arrow::after{content:'▼'}
    th:not(.sort-asc):not(.sort-desc) .sort-arrow::after{content:'⇅'}
    tbody tr:nth-child(even) td{background:var(--soft)}
    tr:hover td{background:var(--line)}
    /* Colonne NON fisse: tutte scorrono normalmente.
       Il colore evidenzia il dato principale ma non blocca lo scorrimento. */
    .tbl-aligned .col-sticky-1,.tbl-aligned .col-sticky-2,.tbl-aligned .col-sticky-3{position:static;background:inherit}
    .tbl-aligned .col-sticky-1{left:auto}
    .tbl-aligned thead .col-sticky-1,.tbl-aligned thead .col-sticky-2,.tbl-aligned thead .col-sticky-3{background:inherit}
    .tbl-aligned tr:hover .col-sticky-1,.tbl-aligned tr:hover .col-sticky-2,.tbl-aligned tr:hover .col-sticky-3{background:inherit}
    .tbl-aligned .col-sticky-edge{box-shadow:none}
    /* Colonna con il valore che decide la classifica (es. Punti, Gol): resta in evidenza */
    .tbl-aligned th.col-highlight{color:var(--blue);background:rgba(15,90,168,.12)}
    .tbl-aligned td.col-highlight{font-weight:800;color:var(--blue);background:rgba(15,90,168,.07)}
    [data-theme="dark"] .tbl-aligned th.col-highlight{background:rgba(59,130,246,.18)}
    [data-theme="dark"] .tbl-aligned td.col-highlight{background:rgba(59,130,246,.13)}
    
    /* Miglioramenti scroll mobile */
    .tableWrap{
      scroll-behavior:smooth;
      -webkit-overflow-scrolling:touch;
      scrollbar-width:thin;
    }
    .tableWrap.has-overflow::after{
      position:sticky;
      right:8px;
      float:right;
      bottom:8px;
      z-index:5;
      font-size:11px;
      font-weight:700;
      padding:4px 8px;
      border-radius:999px;
      background:rgba(15,90,168,.12);
      color:var(--blue);
      pointer-events:none;
    }
    @media(max-width:560px){
      .tableWrap{
        border-radius:14px;
      }
      .tableWrap.has-overflow{
        background:
          linear-gradient(to left, rgba(15,90,168,.10), transparent 24px) right center/24px 100% no-repeat,
          var(--panel);
      }
    }

    /* Suggerimento "scorri", mostrato solo quando la tabella è più larga dello schermo */
    .scroll-hint{display:none;align-items:center;gap:6px;justify-content:center;font-size:12px;color:var(--muted);padding:7px 2px 0}
    .tableWrap.has-overflow + .scroll-hint{display:flex}
    .pill{display:inline-block;border-radius:999px;padding:4px 9px;background:#eef4ff;color:var(--blue);font-weight:800}
    .tbl-avatar-col{width:1%;white-space:nowrap}
    .tbl-logo,.tbl-avatar{width:30px;height:30px;border-radius:8px;object-fit:cover;background:#dbe7f6;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:11px;color:var(--blue);flex:0 0 auto}
    .tbl-avatar{border-radius:50%}
    .mini-logo{width:26px;height:26px;border-radius:7px;object-fit:cover;background:#dbe7f6;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:10px;color:var(--blue);flex:0 0 auto}
    .name-cell{display:flex;align-items:center;gap:9px;min-width:0}
    .name-cell span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
    .name-cell .player-link{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;display:block}
    /* ── Squadre ── */
    .teams{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
    .teamCard{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:16px}
    .teamHead{display:flex;gap:12px;align-items:center;margin-bottom:12px}
    .logo,.avatar{width:58px;height:58px;border-radius:16px;object-fit:cover;background:#dbe7f6;display:flex;align-items:center;justify-content:center;font-weight:900;color:var(--blue);flex:0 0 auto}
    .avatar{width:44px;height:44px;border-radius:50%;font-size:13px}
    .img-placeholder{position:relative;overflow:hidden;color:transparent}
    .img-placeholder::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.42),transparent);transform:translateX(-100%);animation:imgLoading 1.15s infinite}

    .is-empty-fallback{color:transparent}
    .is-empty-fallback::before{content:'';display:block;width:38%;height:38%;border-radius:50%;background:rgba(15,90,168,.18)}
    @keyframes imgLoading{to{transform:translateX(100%)}}
    .player{display:flex;gap:10px;align-items:center;padding:8px 0;border-top:1px solid var(--line)}
    .player b{display:block}
    .player-name{font-weight:600}
    .player.captain .player-name{font-weight:900}
    .captain-armband{display:inline-flex;align-items:center;justify-content:center;margin-left:7px;width:22px;height:16px;border-radius:4px;background:var(--gold);color:#071d3a;font-size:11px;font-weight:900;line-height:1;box-shadow:inset 0 0 0 2px rgba(7,29,58,.15)}
    .captain-armband::before{content:'C'}
    .small{font-size:12px;color:var(--muted)}

    .player-link{border:0;background:transparent;color:inherit;font:inherit;font-weight:inherit;padding:0;margin:0;cursor:pointer;text-align:left;max-width:100%}
    .player-link:hover,.player-link:focus{color:var(--blue);text-decoration:underline;text-underline-offset:3px;outline:none}
    .player-link:focus-visible{box-shadow:0 0 0 3px rgba(245,185,66,.36);border-radius:8px}
    .player-link-inline{display:inline-flex;align-items:center;gap:7px;min-width:0}
    .player-profile-backdrop{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;padding:22px;background:rgba(7,16,35,.72);backdrop-filter:blur(12px);opacity:0;transition:opacity .18s ease}
    .player-profile-backdrop.is-open{opacity:1}
    .player-profile-card{position:relative;width:min(980px,100%);max-height:92vh;overflow:auto;border-radius:30px;border:1px solid rgba(255,255,255,.22);background:linear-gradient(145deg,var(--panel),rgba(15,90,168,.12));box-shadow:0 28px 90px rgba(0,0,0,.42);color:var(--ink)}
    .player-profile-card::before{content:'';position:absolute;inset:0 0 auto auto;width:330px;height:330px;background:radial-gradient(circle,rgba(245,185,66,.26),transparent 68%);pointer-events:none}
    .player-profile-hero{position:relative;display:grid;grid-template-columns:190px minmax(0,1fr);gap:20px;padding:24px;border-radius:30px 30px 0 0;background:linear-gradient(135deg,var(--dark),var(--blue));color:#fff;overflow:hidden}
    .player-profile-hero::after{content:'';position:absolute;inset:auto -80px -120px auto;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.20),transparent 68%)}
    .player-profile-photo{width:170px;height:170px;border-radius:28px;object-fit:cover;object-position:center;background:rgba(255,255,255,.14);border:2px solid rgba(255,255,255,.44);box-shadow:0 18px 36px rgba(0,0,0,.28);display:flex;align-items:center;justify-content:center;font-size:44px;font-weight:900;color:#fff;z-index:1}
    .player-profile-title{position:relative;z-index:1;min-width:0;display:flex;flex-direction:column;justify-content:center;gap:10px}
    .player-profile-title h2{margin:0;color:#fff;font-size:clamp(30px,5vw,56px);line-height:.98;letter-spacing:.01em;text-transform:uppercase;text-shadow:0 8px 22px rgba(0,0,0,.28)}
    .player-profile-sub{display:flex;flex-direction:column;gap:8px;align-items:flex-start;flex-wrap:nowrap;color:#dbeaff;font-weight:800}
    .player-profile-sub .mini-logo{background:#fff;color:var(--blue);border:1px solid rgba(255,255,255,.72)}
    .player-profile-badge{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:6px 10px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.28);color:#fff;font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.04em}
    .player-profile-role-emoji{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:999px;background:rgba(255,255,255,.18);font-size:14px;line-height:1;letter-spacing:0;flex:0 0 22px}
    .player-profile-close{position:absolute;top:14px;right:14px;z-index:3;width:42px;height:42px;border-radius:14px;border:1px solid rgba(255,255,255,.32);background:rgba(255,255,255,.14);color:#fff;font-size:22px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .player-profile-body{position:relative;padding:18px 20px 22px}
    .player-profile-stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:14px}
    .player-profile-stat{position:relative;overflow:hidden;border-radius:20px;border:1px solid var(--line);background:linear-gradient(145deg,var(--panel),rgba(15,90,168,.08));padding:14px;min-height:96px;box-shadow:0 8px 20px var(--shadow)}
    .player-profile-stat.is-gold{background:linear-gradient(145deg,rgba(245,185,66,.23),var(--panel));border-color:rgba(245,185,66,.48)}
    .player-profile-stat .n{font-size:32px;line-height:1;font-weight:900;color:var(--blue);font-variant-numeric:tabular-nums}
    .player-profile-stat.is-gold .n{color:#b77900}
    .player-profile-stat .l{margin-top:7px;color:var(--muted);font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.05em}
    .player-profile-stat .s{margin-top:3px;color:var(--muted);font-size:12px;line-height:1.25}
    .player-profile-panels{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
    .player-profile-section{border:1px solid var(--line);border-radius:22px;background:var(--panel);padding:15px;box-shadow:0 8px 20px var(--shadow)}
    .player-profile-section h3{margin:0 0 10px;color:var(--blue);font-family:'Oswald',Arial,Helvetica,sans-serif;font-size:19px;text-transform:uppercase;letter-spacing:.03em;display:flex;align-items:center;gap:7px}
    .player-profile-timeline{display:flex;flex-direction:column;gap:8px}
    .player-profile-entry{display:flex;align-items:center;justify-content:space-between;gap:12px;border-radius:15px;background:var(--soft);border:1px solid var(--line);padding:10px 12px}
    .player-profile-entry b{color:var(--ink);font-size:14px}
    .player-profile-entry span{color:var(--muted);font-size:12px;font-weight:800}
    .player-profile-entry .value{font-size:18px;color:var(--blue);font-weight:900;font-variant-numeric:tabular-nums;white-space:nowrap}
    .player-profile-empty{border:1px dashed var(--line);border-radius:15px;padding:12px;color:var(--muted);font-size:13px;background:var(--soft)}
    .player-profile-note{margin-top:10px;color:var(--muted);font-size:12px;line-height:1.45}
    body.player-modal-open{overflow:hidden}

    /* ── Partite ── */
    .match{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px;border-bottom:1px solid var(--line)}
    .match:last-child{border-bottom:0}
    .score{font-weight:900;font-size:18px;color:var(--blue);flex:0 0 auto}
    .match-teams{display:flex;align-items:center;gap:8px;flex:1 1 auto;min-width:0}
    .match-team{display:flex;align-items:center;gap:8px;min-width:0}
    .match-vs{color:var(--muted);font-weight:700;font-size:12px;flex:0 0 auto}
    .match-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .match-meta{display:flex;flex-direction:column;gap:2px;min-width:0}
    /* ── Riepilogo giornata: KPI compatti e partite più leggibili ── */
    .riepilogo-card{padding:18px}
    .riepilogo-kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:10px;margin:12px 0 16px}
    .riepilogo-kpi{padding:10px 12px;border-radius:16px;box-shadow:none;min-height:72px;display:flex;flex-direction:column;justify-content:center}
    .riepilogo-kpi .n{font-size:24px;line-height:1.08;letter-spacing:-.02em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .riepilogo-kpi.is-match-max{grid-column:span 3}
    .riepilogo-kpi.is-match-max .n{font-size:22px;white-space:normal;overflow:visible;text-overflow:clip;word-break:normal;overflow-wrap:anywhere}
    .riepilogo-kpi.is-scorer{min-height:72px;display:grid;grid-template-columns:minmax(0,1fr) 64px;gap:12px;align-items:center;justify-content:stretch}
    .riepilogo-kpi.is-scorer .riepilogo-kpi-text{min-width:0}

<script>
/* ════════════════════════════════════════════════
   CRAL Champions — versione migliorata
   Miglioramenti:
   1. XSS fix — nessun template literal con HTML non escaped
   2. Ricerca ottimizzata — ridisegna solo la sezione attiva
   3. Banner errori caricamento visibile
   4. File System Access API (showDirectoryPicker) con fallback
   5. Dark mode con toggle e memoria in localStorage
   6. Ordinamento colonne cliccabile nelle tabelle
   7. Grafici top marcatori e punti squadre (Chart.js inline)
   8. Tab "Tutti i CSV" spostato in modale Avanzato (rimosso dalla nav)
   ════════════════════════════════════════════════ */

/* ── Costanti ── */
const DEFAULT_TITLE    = 'CRAL Champions - Auriga 2026';
const DEFAULT_SUBTITLE = 'Classifiche, calendario, risultati e statistiche giocatori';
const DEFAULT_FILES    = [
  'config.csv','manifest.csv','classifica_squadre.csv','classifica_marcatori.csv',
  'classifica_mvp.csv','classifica_portieri.csv',
  'risultati_partite.csv','risultati.csv','partite.csv',
  'calendario_andata_ritorno.csv','calendario.csv',
  'riepilogo_giornate.csv'
];
const TABS = [
  ['home','🏠 Home'],['classifiche','🏆 Classifiche'],['statistiche','📊 Statistiche'],
  ['squadre','👕 Squadre'],['calendario','📅 Calendario'],['risultati','⚽ Risultati'],
  ['riepilogo','📝 Riepilogo giornate']
];

/* ── Stato globale ── */
let state = {
  config: { titolo: DEFAULT_TITLE, sottotitolo: DEFAULT_SUBTITLE },
  files: {}, rows: {}, imageFiles: {}, imageURLs: {}, imageAliases: {},
  imagesReady: true, // false durante il caricamento manuale differito delle immagini
  search: '', activeTab: 'home',
  selectedRiepilogoGiornata: '',
  sortState: {}   // { tableId: { col, dir } }
};
let loadErrors = [];
let manualLoadActive = false; // true dopo che l'utente ha caricato una cartella manualmente:
                               // impedisce a un autoload tardivo/in corso di sovrascrivere dati più recenti

/* ══════════════════════════════════
   UTILITY
   ══════════════════════════════════ */
function norm(s){ return String(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/&/g,'e').replace(/[^a-z0-9]/g,''); }

function fixItalianAccents(s){
  let out=String(s??'');
  const replaceWord=(word,repl)=>{
    out=out.replace(new RegExp('\\b'+word+'\\b','gi'),m=>{
      if(m===m.toUpperCase()) return repl.toUpperCase();
      if(m[0]===m[0].toUpperCase()) return repl.charAt(0).toUpperCase()+repl.slice(1);
      return repl;
    });
  };
  replaceWord('piu','più');
  replaceWord('perche','perché');
  replaceWord('poiche','poiché');
  replaceWord('finche','finché');
  replaceWord('cosi','così');
  replaceWord('gia','già');
  replaceWord('puo','può');
  replaceWord('cioe','cioè');
  replaceWord('qualita','qualità');
  replaceWord('quantita','quantità');
  replaceWord('citta','città');
  replaceWord('autogoal','autogol');
  out=out.replace(/\bgoal\b/gi,m=>m===m.toUpperCase()?'GOL':(m[0]===m[0].toUpperCase()?'Gol':'gol'));
  out=out.replace(/(^|\s)e'(?=\s|$)/gi,(m,p)=>p+(m.trim()[0]==='E'?'È':'è'));
  out=out.replace(/n'e/gi, m=>m[0]==='N'?"N'è":"n'è");
  return out;
}
/* Inserisce spazi tra parole unite in stile PascalCase/camelCase (es. "FCStealthyDribblers" -> "FC Stealthy Dribblers"),
   gestisce anche sequenze di sole maiuscole (sigle) e l'simbolo & senza spazi attorno. */
function smartSpace(s){
  return String(s||'')
    .replace(/&/g,' & ')
    .replace(/([a-z\u00e0-\u00fc])([A-Z])/g,'$1 $2')
    .replace(/([A-Z]+)([A-Z][a-z])/g,'$1 $2')
    .replace(/\s+/g,' ')
    .trim();
}
function prettyFileName(f){ return smartSpace(f.replace(/\.csv$/i,'').replace(/^squadra_/i,'Squadra ').replace(/_/g,' ')); }

function prettyColumnName(header){
  const raw=String(header||'').trim();
  if(!raw) return '';
  const n=norm(raw);
  const map={
    // Squadre / partite
    squadracasa:'Squadra casa', teamcasa:'Squadra casa', casa:'Casa', home:'Casa', squadra1:'Squadra 1',
    squadratrasferta:'Squadra trasferta', squadraospite:'Squadra ospite', trasferta:'Trasferta', ospite:'Ospite', away:'Trasferta', squadra2:'Squadra 2',
    golcasa:'Gol casa', reticasa:'Gol casa', goalcasa:'Gol casa', gc:'GC', golsquadracasa:'Gol casa',
    goltrasferta:'Gol trasferta', retiTrasferta:'Gol trasferta', goaltrasferta:'Gol trasferta', gt:'GT', golsquadratrasferta:'Gol trasferta',
    risultato:'Risultato', score:'Risultato', esito:'Esito', vincitore:'Vincitore', giornata:'Giornata', turno:'Turno', data:'Data', giorno:'Giorno', note:'Note',

    // Classifiche squadre
    squadra:'Squadra', team:'Squadra', teamcode:'Squadra', teamname:'Squadra', partitegiocate:'PG', giocate:'PG', pg:'PG', vinte:'V', vittorie:'V', pareggiate:'N', pareggi:'N', perse:'P', sconfitte:'P',
    golfatti:'GF', golsegnati:'GF', retifatte:'GF', golsquadra:'Gol squadra', golsubiti:'GS', retisubite:'GS', differenzareti:'DR', diffreti:'DR', dr:'DR',
    punti:'Punti', pts:'Punti', point:'Punti', points:'Punti', puntifinali:'Punti', puntitotali:'Punti totali', puntioriginali:'Punti originali', penalita:'Penalità', notapenalita:'Nota penalità', notepenalita:'Note penalità',

    // Portieri / bonus / penalità
    portiere:'Portiere', migliorportiere:'Miglior portiere', puntiportiere:'Punti PT', puntipt:'Punti PT', ptportiere:'Punti PT',
    cleansheet:'Clean sheet', cleansheets:'Clean sheet', imbattuto:'Clean sheet', imbattibilita:'Imbattibilità', golsubitiportiere:'Gol subiti PT',

    // Giocatori
    giocatore:'Giocatore', calciatore:'Giocatore', player:'Giocatore', playername:'Giocatore', playernome:'Giocatore', nomeplayer:'Giocatore', nomegiocatore:'Giocatore', nomecompleto:'Nome completo', cognomeenome:'Cognome e nome',
    nome:'Nome', cognome:'Cognome', ruolo:'Ruolo', posizione:'Pos.', numero:'Numero', maglia:'Maglia',
    gol:'Gol', goal:'Gol', reti:'Gol', golgiornata:'Gol giornata', retigiornata:'Gol giornata', goalgiornata:'Gol giornata',
    assist:'Assist', autogol:'Autogol', autogoal:'Autogol', autoreti:'Autogol', mvp:'MVP', puntimvp:'Punti MVP',
    presenze:'Presenze', partite:'Partite', mediagol:'Media gol', mediagolpartita:'Media gol/partita',

    // Riepiloghi
    sezione:'Sezione', statistica:'Statistica', valore:'Valore', totale:'Totale', categoria:'Categoria', descrizione:'Descrizione',
    marcatoricasa:'Marcatori casa', marcatoritrasferta:'Marcatori trasferta', marcatore:'Marcatore', marcatori:'Marcatori',
    totalemarcatoregiornata:'Totale marcatore giornata', voce:'Voce', voci:'Voci', dato:'Dato', etichetta:'Etichetta'
  };
  if(map[n]) return map[n];

  // Split controllato per intestazioni tutte attaccate ma non presenti nella mappa.
  // Lavora sui termini più comuni dei CSV del torneo senza rovinare sigle tipo MVP o PG.
  const tokens=['player','team','code','squadra','trasferta','ospite','giornata','originali','penalita','penalità','finali','totali','punti','portiere','giocatore','marcatori','marcatore','miglior','differenza','partite','partita','presenze','statistica','valore','cognome','numero','subiti','fatti','clean','sheet','assist','autogol','ruolo','media','goal','casa','note','nota','nome','reti','gol','mvp','pg','gf','gs','dr','pt','v','n','p'];
  let compact=n;
  const parts=[];
  while(compact){
    const found=tokens.find(t=>compact.startsWith(t));
    if(found){
      parts.push(found);
      compact=compact.slice(found.length);
      continue;
    }
    const nextIndexes=tokens.map(t=>compact.indexOf(t)).filter(i=>i>0);
    const next=nextIndexes.length ? Math.min(...nextIndexes) : compact.length;
    parts.push(compact.slice(0,next));
    compact=compact.slice(next);
  }
  if(parts.length>1){
    let joined=parts.join(' ')
      .replace(/\bpt\b/gi,'PT')
      .replace(/\bmvp\b/gi,'MVP')
      .replace(/\bpg\b/gi,'PG')
      .replace(/\bgf\b/gi,'GF')
      .replace(/\bgs\b/gi,'GS')
      .replace(/\bdr\b/gi,'DR')
      .replace(/\bpenalita\b/gi,'penalità');
    return joined.charAt(0).toUpperCase()+joined.slice(1);
  }

  const spaced=smartSpace(raw.replace(/_/g,' '));
  return spaced.charAt(0).toUpperCase()+spaced.slice(1);
}

/* Escape sicuro tramite DOM — previene XSS */
function esc(s){ const t=document.createElement('span'); t.textContent=String(s??''); return t.innerHTML; }
function initials(s){
  // Non mostrare mai "?" come fallback visivo.
  // Usa sempre l'ordine Nome + Cognome; se c'è una sola parola usa le prime 2 lettere.
  const raw = Array.isArray(s)
    ? (s.find(x=>String(x||'').trim() && String(x||'').trim()!=='?') || '')
    : String(s||'');
  const text = smartSpace(raw)
    .replace(/\?/g,' ')
    .replace(/\([^)]*\)/g,' ')
    .replace(/\b\d+\b/g,' ')
    .trim();
  if(!text) return '';
  const stop = new Set(['di','de','del','della','dei','degli','da','dal','dallo','la','lo','le','il','i','gli']);
  const parts = text.split(/\s+/).filter(x=>x && !stop.has(x.toLowerCase()));
  if(!parts.length) return '';
  if(parts.length===1) return parts[0].slice(0,2).toUpperCase();
  return (parts[0][0] + parts[parts.length-1][0]).toUpperCase();
}
function canonicalPlayerInitialName(name){
  const names=(Array.isArray(name)?name:[name])
    .map(x=>smartSpace(x))
    .filter(x=>String(x||'').trim() && String(x||'').trim()!=='?');
  if(!names.length) return '';

  // Se il giocatore è presente nei CSV squadra, usa sempre Nome + Cognome
  // come sorgente delle iniziali, anche quando una tabella mostra Cognome + Nome.
  const keys=names.map(n=>norm(cleanPersonTokenForTeamLookup(n))).filter(Boolean);
  for(const f of sectionFiles('squadra')){
    for(const row of rowsToObjects(state.rows[f]||[])){
      const rowNames=playerImageNames(row);
      const rowKeys=rowNames.map(n=>norm(cleanPersonTokenForTeamLookup(n))).filter(Boolean);
      const match=rowKeys.some(rowKey=>keys.some(key=>
        rowKey===key ||
        (key.length>=3 && rowKey.includes(key)) ||
        (rowKey.length>=3 && key.includes(rowKey))
      ));
      if(match) return playerFullName(row) || names[0];
    }
  }
  return names[0];
}
function setStatus(msg,good=false){ const el=document.getElementById('status'); el.innerHTML=good?`<span class="ok">${esc(msg)}</span>`:esc(msg); }
function cleanLoadErrorName(err){ return String(err||'').split(' — ')[0].trim(); }
function dataLoadStatus(csvCount){
  const missing=[...new Set(loadErrors.map(cleanLoadErrorName).filter(Boolean))];
  if(missing.length){
    return `Caricamento dati completato da ${csvCount} file; verificare file ${missing.join(', ')}`;
  }
  return 'Caricamento dati completato';
}
function sepFor(line){ const semi=(line.match(/;/g)||[]).length,comma=(line.match(/,/g)||[]).length; return semi>=comma?';':','; }

/* ══════════════════════════════════
   CSV PARSER
   ══════════════════════════════════ */
function parseCsv(text){
  text=String(text||'').replace(/^\uFEFF/,''); if(!text.trim()) return [];
  const sep=sepFor(text.split(/\r?\n/).find(l=>l.trim())||'');
  const rows=[]; let row=[],val='',q=false;
  for(let i=0;i<text.length;i++){ const c=text[i],n=text[i+1];
    if(c==='"'&&q&&n==='"'){ val+='"'; i++; }
    else if(c==='"'){ q=!q; }
    else if(c===sep&&!q){ row.push(val.trim()); val=''; }
    else if((c==='\n'||c==='\r')&&!q){ if(val!==''||row.length){ row.push(val.trim()); rows.push(row); row=[]; val=''; } if(c==='\r'&&n==='\n') i++; }
    else val+=c;
  }
  if(val!==''||row.length){ row.push(val.trim()); rows.push(row); }
  const filtered=rows.filter(r=>r.some(x=>String(x).trim()!==''));
  /* Normalizza tutte le righe alla larghezza massima — evita crash su calendari
     a blocchi dove "GIORNATA 1;;" ha più colonne delle righe dati */
  const maxCols=Math.max(0,...filtered.map(r=>r.length));
  return filtered.map(r=>{ while(r.length<maxCols) r.push(''); return r; });
}
const _rowsToObjectsCache = new WeakMap();
function rowsToObjects(rows){
  if(!rows||!rows.length) return [];
  if(_rowsToObjectsCache.has(rows)) return _rowsToObjectsCache.get(rows);
  const h=rows[0].map(x=>String(x||'').trim());
  const out=rows.slice(1).map(r=>Object.fromEntries(h.map((k,i)=>[k,r[i]??''])));
  _rowsToObjectsCache.set(rows,out);
  return out;
}
function col(obj,names){ const keys=Object.keys(obj||{}); for(const n of names){ const nk=norm(n); const k=keys.find(x=>norm(x)===nk||norm(x).includes(nk)); if(k) return obj[k]; } return ''; }
function num(x){ const n=parseFloat(String(x||'0').replace(',','.').replace(/[^0-9.-]/g,'')); return Number.isFinite(n)?n:0; }

function fileKind(f){ const n=norm(f);
  if(n.includes('classificasquadre')) return 'classifica_squadre';
  if(n.includes('marcatori')) return 'marcatori';
  if(n.includes('mvp')) return 'mvp';
  if(n.includes('portieri')) return 'portieri';
  // File riepilogo: uno per giornata o un riepilogo unico.
  // Esempi riconosciuti: giornata_1.csv, riepilogo_giornata_1.csv, referto_giornata_1.csv, riepilogo_giornate.csv.
  if(n.includes('riepilogogiornata')||n.includes('riepilogogiornate')||n.includes('refertogiornata')||/^giornata\d*csv$/.test(n)||/^giornata\d+/.test(n)) return 'riepilogo';
  if(n.includes('risultati')||n==='partitecsv'||n.includes('partite')) return 'risultati';
  if(n.includes('calendario')) return 'calendario';
  if(/^squadra/i.test(f)) return 'squadra';
  return 'altro';
}
function sectionFiles(kind){ return Object.keys(state.rows).filter(f=>fileKind(f)===kind); }

   IMMAGINI
   ══════════════════════════════════ */
function imageExts(){ return ['png','jpg','jpeg']; }
function baseNoExt(path){ return String(path||'').split('/').pop().replace(/\.[^.]+$/,''); }
function imageFolderToken(type){ return type==='team'?'immaginisquadre':'immaginigiocatori'; }

function rememberImage(relPath,file){
  const rel=String(relPath||file?.name||'');
  const url=URL.createObjectURL(file);
  const fullKey=norm(rel);
  const baseKey=norm(baseNoExt(rel));
  const folderKey=rel.toLowerCase().includes('/squadre/')||rel.toLowerCase().includes('\\squadre\\')?'team':
                  rel.toLowerCase().includes('/giocatori/')||rel.toLowerCase().includes('\\giocatori\\')?'player':'';

  state.imageURLs[fullKey]=url;
  state.imageAliases=state.imageAliases||{};
  if(baseKey && !state.imageAliases[baseKey]) state.imageAliases[baseKey]=url;
  if(baseKey && folderKey) state.imageAliases[folderKey+':'+baseKey]=url;
  return url;
}

function imageFor(type,name){
  const key=norm(name); if(!key) return '';
  const aliases=state.imageAliases||{};
  const typed=type==='team'?'team:'+key:'player:'+key;
  if(aliases[typed]) return aliases[typed];
  if(aliases[key]) return aliases[key];

  const folder=imageFolderToken(type);
  const candidates=Object.entries(state.imageURLs||{}).map(([k,url])=>{
    const rawBase=(k.split('/').pop()||k).replace(/(png|jpg|jpeg)$/i,'');
    const base=norm(rawBase);
    let score=999;
    if(k.includes(folder) && base===key) score=0;
    else if(base===key) score=1;
    else if(k.includes(folder) && (base.includes(key)||key.includes(base))) score=2;
    else if(k.includes(folder) && k.includes(key)) score=3;
    else if(base.includes(key)||key.includes(base)) score=4;
    else if(k.includes(key)) score=5;
    return {score,url};
  }).filter(x=>x.score<999).sort((a,b)=>a.score-b.score);
  if(candidates.length) return candidates[0].url;

  const prefix=type==='team'?'immagini/squadre/':'immagini/giocatori/';
  const dataPrefix=type==='team'?'data/immagini/squadre/':'data/immagini/giocatori/';
  // Fallback statici: prova solo PNG/JPG/JPEG. Utile quando apri index.html senza selezionare cartella.
  return prefix+key+'.png';
}

function imagePlaceholderEl(cls,name){
  const d=document.createElement('div');
  d.className=cls+' img-placeholder';
  d.setAttribute('aria-label','Caricamento immagine '+String(name||''));
  return d;
}

/* Prova tutte le candidate IN PARALLELO e risolve con la prima che carica con successo
   (o null se nessuna esiste). Molto più rapido del tentativo sequenziale uno alla volta:
   il tempo totale è quello della richiesta più lenta, non la somma di tutte.
   La cache evita che lo stesso grafico/avatar riesegua gli stessi probe quando Chart.js
   forza resize/update ravvicinati o quando si cambia tab e si torna indietro. */
const _imageProbeCache=new Map();
/* Cache sincrona degli URL immagine già risolti.
   Serve soprattutto quando si cambia tab: gli elementi <img> vengono ricreati,
   ma il src già trovato può essere assegnato subito senza mostrare placeholder/probe. */
const _resolvedImageURLCache=new Map();
function imageCacheCompositeKey(type,names){
  return type+':'+(names||[]).map(norm).filter(Boolean).join('|');
}
function cachedResolvedImage(type,names){
  const composite=imageCacheCompositeKey(type,names);
  const keys=[composite,...(names||[]).map(n=>type+':'+norm(n)).filter(Boolean)];
  for(const key of keys){
    if(_resolvedImageURLCache.has(key)){
      const value=_resolvedImageURLCache.get(key);
      if(value) return value;
    }
  }
  // Il fallimento viene memorizzato solo per la combinazione esatta di nomi,
  // così un alias più completo può ancora trovare l'immagine in un'altra scheda.
  return _resolvedImageURLCache.get(composite);
}
function rememberResolvedImage(type,names,src){
  const composite=imageCacheCompositeKey(type,names);
  if(!composite) return;
  if(src){
    _resolvedImageURLCache.set(composite,src);
    (names||[]).forEach(n=>{ const key=norm(n); if(key) _resolvedImageURLCache.set(type+':'+key,src); });
  }else{
    _resolvedImageURLCache.set(composite,null);
  }
}
function clearImageProbeCache(){
  _imageProbeCache.clear();
  _resolvedImageURLCache.clear();
}
function probeFirstWorkingImage(candidates){
  const unique=[...new Set((candidates||[]).filter(Boolean))];
  if(!unique.length) return Promise.resolve(null);
  const cacheKey=unique.join('\\n');
  if(_imageProbeCache.has(cacheKey)) return _imageProbeCache.get(cacheKey);
  const promise=new Promise(resolve=>{
    let pending=unique.length, settled=false;
    unique.forEach(src=>{
      const probe=new Image();
      probe.decoding='async';
      probe.onload=()=>{ if(!settled){ settled=true; resolve(src); } };
      probe.onerror=()=>{ pending--; if(!settled && pending<=0) resolve(null); };
      probe.src=src;
    });
  }).catch(()=>null);
  _imageProbeCache.set(cacheKey,promise);
  return promise;
}

/* Observer condiviso: avvia il probe delle immagini solo quando l'elemento è vicino al
   viewport, così non scarichiamo centinaia di candidate per avatar non ancora visibili. */
let _avatarIO=null;
function avatarObserver(){
  if(_avatarIO) return _avatarIO;
  if(!('IntersectionObserver' in window)){
    _avatarIO={ observe(el){ const cb=el._onAvatarVisible; if(cb) cb(); }, unobserve(){} };
    return _avatarIO;
  }
  _avatarIO=new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        _avatarIO.unobserve(entry.target);
        const cb=entry.target._onAvatarVisible;
        if(cb) cb();
      }
    });
  },{rootMargin:'250px'});
  return _avatarIO;
}

/* Crea elemento img o div iniziali — NESSUN innerHTML con dati utente.
   Accetta anche una lista di nomi alternativi: utile quando nei CSV squadra
   il giocatore è Cognome Nome, ma negli altri CSV o nei file immagine è Nome Cognome. */
function imgOrInitialEl(type,name,cls){
  const names=(Array.isArray(name)?name:[name])
    .map(x=>smartSpace(x))
    .filter(Boolean);
  const mainName=(type==='player' ? canonicalPlayerInitialName(names) : '') || names.find(n=>String(n||'').trim() && String(n||'').trim()!=='?') || '';
  // Durante il caricamento manuale delle immagini non mostrare iniziali/? temporanei:
  // renderizziamo placeholder neutri e facciamo un solo refresh quando gli alias sono pronti.
  if(manualLoadActive && state.imagesReady===false){
    return imagePlaceholderEl(cls,mainName);
  }

  const img=document.createElement('img');
  img.className=cls;
  img.alt=mainName;
  img.decoding='async';
  img.loading='lazy';

  const prefixes=type==='team'?['immagini/squadre/','data/immagini/squadre/']:['immagini/giocatori/','data/immagini/giocatori/'];
  const candidates=[];
  const addCandidate=(src)=>{
    if(src && !candidates.includes(src)) candidates.push(src);
  };

  // Prima prova gli alias reali caricati dal picker/cartella, poi i fallback statici.
  names.forEach(n=>addCandidate(imageFor(type,n)));
  names.forEach(n=>{
    const key=norm(n);
    for(const pref of prefixes){
      for(const ext of imageExts()) addCandidate(pref+key+'.'+ext);
    }
  });

  // Caso importante per Classifiche/Squadre/Riepilogo:
  // se l'immagine era già stata trovata in una scheda precedente, assegna subito src
  // senza attendere Promise/IntersectionObserver e senza mostrare il caricamento.
  const cached=cachedResolvedImage(type,names);
  if(cached){
    img.src=cached;
    return img;
  }
  if(cached===null){
    const d=document.createElement('div');
    d.className=cls;
    d.textContent=initials(mainName);
    if(!d.textContent) d.classList.add('is-empty-fallback');
    return d;
  }

  /* Quando l'avatar diventa visibile (o subito, se IntersectionObserver non è
     supportato), prova tutte le candidate in parallelo invece che una alla volta.
     La prima URL valida viene salvata in _resolvedImageURLCache, così i successivi
     cambi tab riusano subito la stessa immagine. */
  img._onAvatarVisible=()=>{
    probeFirstWorkingImage(candidates).then(src=>{
      rememberResolvedImage(type,names,src);
      if(!img.isConnected) return; // la sezione è cambiata nel frattempo
      if(src){
        img.src=src; // stessa referenza: eventuali title/alt impostati dal chiamante restano validi
      }else{
        const d=document.createElement('div');
        d.className=cls;
        d.textContent=initials(mainName);
        if(!d.textContent) d.classList.add('is-empty-fallback');
        img.replaceWith(d);
      }
    });
  };
  avatarObserver().observe(img);
  return img;
}

const HERO_LOGO_FALLBACK = document.getElementById('heroLogoWrap')?.innerHTML || '';
let heroLogoLoaded=false;
let _heroLogoLoadToken=0;

function resetHeroLogo(){
  const wrap=document.getElementById('heroLogoWrap');
  if(wrap && HERO_LOGO_FALLBACK) wrap.innerHTML=HERO_LOGO_FALLBACK;
}
function invalidateHeroLogo(){
  heroLogoLoaded=false;
  _heroLogoLoadToken++;
  resetHeroLogo();
}

function logoPriority(key){
  const file=key.split('/').pop()||key;
  if(file.includes('logo')&&file.includes('cral')) return 0;
  if(file.includes('cral')) return 1;
  if(file.includes('logo')) return 2;
  return 99;
}

function logoCandidates(){
  const uploaded=Object.keys(state.imageURLs)
    .filter(k=>k.includes('immagini')&&(k.includes('logo')||k.includes('cral')))
    .sort((a,b)=>logoPriority(a)-logoPriority(b))
    .map(k=>state.imageURLs[k]);

  // Fallback statici: funzionano sia con index.html nella root sia con asset dentro data/,
  // provando più nomi/estensioni comuni nel caso il file non si chiami esattamente logo_cral.png.
  const names=['logo_cral','logo-cral','logocral','cral_logo','cral-logo','cral','logo'];
  const exts=['png','jpg','jpeg'];
  const dirs=['immagini/','data/immagini/','./immagini/','./data/immagini/'];
  const generated=[];
  dirs.forEach(d=>names.forEach(n=>exts.forEach(e=>generated.push(d+n+'.'+e))));
  return [...uploaded, ...generated];
}

function tryLoadLogo(){
  if(heroLogoLoaded) return; // già caricato: evita di azzerarlo e riprovare inutilmente
  const wrap=document.getElementById('heroLogoWrap'); if(!wrap) return;
  const candidates=logoCandidates();
  const token=++_heroLogoLoadToken;
  resetHeroLogo();

  // Stessa logica veloce degli avatar: niente catena logo_1 -> logo_2 -> ...
  // Se nessuna candidata esiste, resta lo SVG di fallback già presente nell'header.
  probeFirstWorkingImage(candidates).then(src=>{
    if(!src || token!==_heroLogoLoadToken || heroLogoLoaded || !wrap.isConnected) return;
    const img=document.createElement('img');
    img.alt='Logo CRAL';
    img.decoding='async';
    img.src=src;
    wrap.innerHTML='';
    wrap.appendChild(img);
    heroLogoLoaded=true;
  });
}

/* ══════════════════════════════════
   BANNER ERRORI DETTAGLIATO
   ══════════════════════════════════ */
/* Analizza un CSV caricato e restituisce lista di problemi specifici */
function diagnoseCSV(filename, rawText, parsedRows){
  const problems=[];
  if(!rawText||!rawText.trim()){
    problems.push({icon:'📭',msg:'Il file è completamente vuoto.',fix:'Esportalo di nuovo dal gestionale e verifica che contenga dati.'});
    return problems;
  }
  // Encoding BOM anomalo
  if(rawText.charCodeAt(0)===0xFFFD)
    problems.push({icon:'🔤',msg:'Encoding non riconosciuto (possibile UTF-16 o Latin-1 corrotto).',fix:'Salva il CSV come UTF-8 dal gestionale prima di esportarlo.'});
  // Separatore misto
  const lines=rawText.split(/\r?\n/).filter(l=>l.trim());
  const semiCounts=lines.map(l=>(l.match(/;/g)||[]).length);
  const commaCounts=lines.map(l=>(l.match(/,/g)||[]).length);
  const mainSep=semiCounts[0]>=commaCounts[0]?';':',';
  const inconsistent=lines.slice(1).filter((l,i)=>{
    const sc=(l.match(/;/g)||[]).length, cc=(l.match(/,/g)||[]).length;
    return mainSep===';'?cc>sc:sc>cc;
  });
  if(inconsistent.length>0)
    problems.push({icon:'↔️',msg:`Separatore non uniforme: ${inconsistent.length} riga/e usano il separatore sbagliato (atteso "${mainSep}").`,fix:'Apri il CSV in un editor di testo e uniforma il separatore, oppure riesportalo con le impostazioni corrette.'});
  // Righe con numero di colonne diverso dall'header
  if(parsedRows&&parsedRows.length>1){
    /* I calendari a blocchi (GIORNATA N;;) hanno struttura volutamente
       disomogenea — saltare i controlli di colonne su questi file */
    const isBlockFmt=isBlockCalendar(rawText);
    if(!isBlockFmt){
      const expectedCols=parsedRows[0].length;
      const badRows=parsedRows.slice(1).map((r,i)=>({row:i+2,cols:r.length})).filter(x=>x.cols!==expectedCols&&x.cols>1);
      if(badRows.length){
        const sample=badRows.slice(0,3).map(x=>`riga ${x.row} (${x.cols} colonne invece di ${expectedCols})`).join(', ');
        problems.push({icon:'📐',msg:`Numero colonne non uniforme: ${badRows.length} riga/e non corrispondono all'header. Es: ${sample}.`,fix:'Controlla se ci sono virgole/punti e virgola nei valori (devono essere racchiusi tra virgolette) o righe extra in fondo al file.'});
      }
      // Header con colonne vuote
      const emptyHeaders=parsedRows[0].map((h,i)=>({h,i})).filter(x=>!x.h||!x.h.trim());
      if(emptyHeaders.length)
        problems.push({icon:'🏷️',msg:`${emptyHeaders.length} colonna/e senza intestazione (posizioni: ${emptyHeaders.map(x=>x.i+1).join(', ')}).`,fix:'Aggiungi un nome a tutte le colonne nella prima riga del CSV.'});
      // Righe totalmente vuote nel mezzo
      const midEmpty=parsedRows.slice(1).filter(r=>r.every(c=>!String(c).trim()));
      if(midEmpty.length)
        problems.push({icon:'⬜',msg:`${midEmpty.length} riga/e completamente vuota/e nel file.`,fix:'Rimuovi le righe vuote dal CSV prima di caricarlo.'});
      // Valori numerici attesi (gol, punti) che non sono numeri
      const numCols=['gol','punti','pts','reti','goal','presenze','partite'];
      parsedRows[0].forEach((h,hi)=>{
        if(!numCols.some(nc=>norm(h).includes(norm(nc)))) return;
        const badVals=parsedRows.slice(1).filter(r=>r[hi]&&r[hi].trim()&&isNaN(parseFloat(String(r[hi]).replace(',','.'))));
        if(badVals.length)
          problems.push({icon:'🔢',msg:`Colonna "${h}": ${badVals.length} valore/i non numerici (es: "${String(badVals[0][hi]).slice(0,20)}").`,fix:'Sostituisci testo o celle vuote con 0 o un numero valido nella colonna '+h+'.'});
      });
    }
    // Solo header, nessun dato (vale per tutti i tipi)
    if(parsedRows.length===1)
      problems.push({icon:'📋',msg:'Il file contiene solo l\'intestazione ma nessun dato.',fix:'Verifica che l\'esportazione dal gestionale includa anche le righe di dati.'});
  }
  return problems;
}

function showErrors(){
  const banner=document.getElementById('errorBanner');
  const groups=document.getElementById('errGroups');
  const count=document.getElementById('errCount');
  // Raccoglie anche problemi interni ai CSV caricati
  const csvProblems=[];
  for(const [f,raw] of Object.entries(state.files)){
    if(!/\.csv$/i.test(f)) continue;
    const diag=diagnoseCSV(f,raw,state.rows[f]);
    if(diag.length) csvProblems.push({file:f,issues:diag});
  }
  const totalIssues=loadErrors.length+csvProblems.reduce((s,x)=>s+x.issues.length,0);
  if(!totalIssues){ banner.style.display='none'; return; }
  count.textContent=totalIssues;
  groups.innerHTML='';

  // Gruppo: file non trovati
  if(loadErrors.length){
    const det=document.createElement('details'); det.className='err-section'; det.open=true;
    const sum=document.createElement('summary'); sum.textContent=`File non trovati (${loadErrors.length})`;
    det.appendChild(sum);
    loadErrors.forEach(e=>{
      const div=document.createElement('div'); div.className='err-item';
      div.innerHTML=`<span class="err-icon">❌</span><div><div>${esc(e)}</div><div class="err-fix">Controlla che il file sia nella stessa cartella di index.html e che il nome corrisponda esattamente a quello in manifest.csv.</div></div>`;
      det.appendChild(div);
    });
    groups.appendChild(det);
  }

  // Gruppo: problemi nei CSV caricati
  csvProblems.forEach(({file,issues})=>{
    const det=document.createElement('details'); det.className='err-section';
    const sum=document.createElement('summary'); sum.textContent=`${file} — ${issues.length} problema/i nel contenuto`;
    det.appendChild(sum);
    issues.forEach(issue=>{
      const div=document.createElement('div'); div.className='err-item';
      const icon=document.createElement('span'); icon.className='err-icon'; icon.textContent=issue.icon;
      const body=document.createElement('div');
      const msg=document.createElement('div'); msg.textContent=issue.msg;
      const fix=document.createElement('div'); fix.className='err-fix'; fix.textContent='→ '+issue.fix;
      body.appendChild(msg); body.appendChild(fix);
      div.appendChild(icon); div.appendChild(body); det.appendChild(div);
    });
    groups.appendChild(det);
  });

  banner.style.display='block';
}

   RICERCA — filtra solo sulla sezione attiva

let _searchTermsCache={ key:'', terms:[], playerMatched:false };
function nameSearchVariants(value){
  const clean=smartSpace(String(value||'')
    .replace(/\bx\s*\d+\b/ig,'')
    .replace(/\(.*?\)/g,' ')
    .replace(/\s+\d+\s*(?:gol|goal|reti?)\b/ig,'')
    .replace(/\b(?:gol|goal|reti?)\s*\d+\b/ig,'')
    // Nei CSV i portieri possono essere scritti come "Nome PT": PT/P è ruolo,
    // non deve diventare un termine di ricerca, altrimenti filtrando un portiere
    // vengono agganciati tutti gli altri portieri.
    .replace(/\b(?:pt|p|portiere|goalkeeper)\b/ig,' ')
    .trim());
  if(!clean) return [];
  const variants=new Set([norm(clean)]);
  const parts=clean.split(/\s+/).map(norm).filter(x=>x && x.length>=3);
  parts.forEach(x=>variants.add(x));
  if(parts.length>1){
    variants.add(parts.slice().reverse().join(''));
    variants.add(parts.join(''));
  }
  return [...variants].filter(Boolean);
}
function collectKnownPlayerSearchGroups(){
  const groups=[];
  const addNames=(names)=>{
    const variants=new Set();
    (Array.isArray(names)?names:[names]).forEach(n=>nameSearchVariants(n).forEach(v=>variants.add(v)));
    if(variants.size) groups.push([...variants]);
  };

  // Rosa squadre: è la sorgente migliore per collegare nome e cognome anche
  // quando nei riepiloghi compare solo uno dei due.
  for(const f of sectionFiles('squadra')){
    rowsToObjects(state.rows[f]).forEach(r=>addNames(playerImageNames(r)));
  }

  // Fallback sui CSV riepilogo/classifiche: copre nomi non presenti nei file squadra.
  ['marcatori','mvp','portieri'].forEach(kind=>{
    sectionFiles(kind).forEach(f=>rowsToObjects(state.rows[f]).forEach(r=>addNames(playerNameFromRow(r))));
  });
  sectionFiles('riepilogo').forEach(f=>{
    const parsed=parseRiepilogoFile(f);
    [...parsed.marcatori,...(parsed.totaliMarcatori||[]),...parsed.mvp,...parsed.portiere,...parsed.autogoal]
      .forEach(r=>addNames(playerNameFromRow(r)));
  });
  return groups;
}
function searchTermsForCurrentQuery(){
  const q=norm(state.search);
  const key=q+'|'+Object.keys(state.rows).sort().join('|');
  if(_searchTermsCache.key===key) return _searchTermsCache;
  const terms=new Set();
  let playerMatched=false;
  if(q){
    terms.add(q);
    collectKnownPlayerSearchGroups().forEach(group=>{
      if(group.some(v=>v.includes(q)||q.includes(v))){
        playerMatched=true;
        // Aggiunge solo le varianti che contengono o sono contenute nella query:
        // evita di aggiungere frammenti isolati (es. "giovanni") che causerebbero
        // il match di altri giocatori con lo stesso nome quando si cerca per cognome.
        group.forEach(v=>{ if(v.includes(q)||q.includes(v)) terms.add(v); });
      }
    });
  }
  _searchTermsCache={ key, terms:[...terms].filter(Boolean), playerMatched };
  return _searchTermsCache;
}
function isPlayerSearchActive(){
  const q=norm(state.search);
  return !!q && searchTermsForCurrentQuery().playerMatched;
}
function isGoalkeeperRow(row){
  const role=fieldLoose(row,['ruolo','role','posizione','position']);
  const roleKey=norm(role);
  if(roleKey==='p'||roleKey==='pt'||roleKey.includes('portiere')||roleKey.includes('goalkeeper')) return true;
  if(roleInitial(role)==='P') return true;
  const name=playerNameFromRow(row);
  return /\bPT\b/i.test(String(name||''));
}
function isGoalkeeperSearchActive(){
  if(!isPlayerSearchActive()) return false;

  for(const f of sectionFiles('squadra')){
    const matched=rowsToObjects(state.rows[f]).filter(rowMatchesPersonSearch);
    if(matched.length) return matched.some(isGoalkeeperRow);
  }

  for(const f of sectionFiles('portieri')){
    if(rowsToObjects(state.rows[f]).some(rowMatchesPersonSearch)) return true;
  }

  for(const f of sectionFiles('riepilogo')){
    const parsed=parseRiepilogoFile(f);
    if((parsed.portiere||[]).some(rowMatchesPersonSearch)) return true;
  }

  return false;
}
function personValuesFromRow(row){
  const values=[];
  const add=(v)=>{
    const clean=smartSpace(v);
    if(clean && !values.some(x=>norm(x)===norm(clean))) values.push(clean);
  };

  const directFields=[
    ['giocatore','marcatore','calciatore','player','nome giocatore','nome completo','cognome e nome','mvp','portiere','autore','autorete'],
    ['miglior marcatore','top scorer','migliore in campo','man of the match','motm']
  ];
  directFields.forEach(names=>add(firstPresent(row,[names])));

  const nome=exactVal(row,['nome','first name','firstname']);
  const cognome=exactVal(row,['cognome','last name','lastname']);
  if(nome || cognome){
    add(uniqueNameParts([nome,cognome]));
    add(uniqueNameParts([cognome,nome]));
  }

  Object.keys(row||{}).forEach(k=>{
    const nk=norm(k);
    if(
      nk==='giocatore' || nk==='marcatore' || nk==='player' || nk==='calciatore' ||
      nk==='mvp' || nk==='portiere' || nk==='nome' || nk==='cognome' ||
      nk.includes('nomegiocatore') || nk.includes('nomecompleto') || nk.includes('cognomeenome') ||
      nk.includes('marcatore') || nk.includes('miglioreincampo') || nk.includes('manofthematch')
    ){
      add(row[k]);
    }
  });

  return values;
}
function rowMatchesPersonSearch(row){
  const q=norm(state.search);
  if(!q) return false;
  const terms=searchTermsForCurrentQuery().terms;
  const variants=[];
  personValuesFromRow(row).forEach(v=>{
    nameSearchVariants(v).forEach(x=>{ if(x && !variants.includes(x)) variants.push(x); });
  });
  // Solo v.includes(t): la variante della riga deve contenere il termine cercato.
  // Rimosso t.includes(v): il termine composto "giovannicamposeo" contiene "giovanni",
  // facendo matchare per errore "Giovanni Bianchi" quando si cerca "Camposeo".
  return variants.some(v=>terms.some(t=>v.includes(t)));
}
function isRiepilogoPlayerSearch(parsed,file){
  const q=norm(state.search);
  if(!q) return false;
  if(isPlayerSearchActive()) return true;
  const selected=state.selectedRiepilogoGiornata;
  const rows=[
    ...(parsed.marcatori||[]),
    ...(parsed.totaliMarcatori||[]),
    ...(parsed.mvp||[]),
    ...(parsed.portiere||[]),
    ...(parsed.autogoal||[])
  ].filter(r=>!selected || rowGiornataKey(r,file)===selected);
  return rows.some(rowMatchesPersonSearch);
}
function rowMatchesSearch(r){
  const q=norm(state.search);
  if(!q) return true;
  const terms=searchTermsForCurrentQuery().terms;
  const hay=norm(Array.isArray(r)?r.join(' '):JSON.stringify(r));
  return terms.some(t=>hay.includes(t));
}
function filterRows(rows){
  return rows.filter(rowMatchesSearch);
}

/* ══════════════════════════════════
   TABELLE CON ORDINAMENTO
   ══════════════════════════════════ */
let _tableCounter=0;
/* Nomi di colonna candidati per individuare la colonna "nome" da affiancare a logo/avatar */
const NAME_COL_CANDIDATES_TEAM   = ['squadra','team','nome squadra','club'];
const NAME_COL_CANDIDATES_PLAYER = ['giocatore','marcatore','nome','calciatore','player','cognome e nome','portiere'];

function findNameColIndex(headers, imgType){
  const candidates = imgType==='team' ? NAME_COL_CANDIDATES_TEAM : NAME_COL_CANDIDATES_PLAYER;
  const normed = headers.map(h=>norm(h));
  for(const c of candidates){
    const nc = norm(c);
    const idx = normed.findIndex(h=>h===nc||h.includes(nc));
    if(idx>=0) return idx;
  }
  return 0; // fallback: prima colonna
}

/* Porta in prima posizione le colonne indicate (es. Giocatore+Gol), lasciando le altre
   nell'ordine originale subito dopo: restano leggibili scorrendo, ma non serve farlo
   per leggere il dato principale. */
function reorderIndices(headers, priorityNames){
  if(!priorityNames || !priorityNames.length) return null;
  const normed=headers.map(h=>norm(h));
  const used=new Set();
  const order=[];
  priorityNames.forEach(name=>{
    const nc=norm(name);
    const idx=normed.findIndex((h,i)=>!used.has(i) && (h===nc || h.includes(nc)));
    if(idx>=0){ order.push(idx); used.add(idx); }
  });
  if(!order.length) return null;
  headers.forEach((_,i)=>{ if(!used.has(i)) order.push(i); });
  return order;
}
function tableColumnRole(header,index,imgType,nameColIdx){
  const n=norm(header);
  if(imgType && index===nameColIdx) return imgType==='team' ? 'team' : 'person';
  if(['pos','posizione','rank','classifica'].includes(n)) return 'rank';
  if(['sezione','tipo','categoria'].includes(n)) return 'section';
  if(['giocatore','marcatore','calciatore','player','nomegiocatore','nomecompleto','cognomeenome','portiere'].includes(n)) return 'person';
  if(n.includes('giocatore') || n.includes('marcatore') || n.includes('portiere')) return 'person';
  if(['squadra','team','club'].includes(n) || n.includes('squadra')) return 'team';
  if(['giornata','turno','round'].includes(n)) return 'round';
  if(['data','giorno','date'].includes(n)) return 'date';
  if(['partita','match','gara','incontro'].includes(n)) return 'match';
  if(n.includes('punti') || n.includes('gol') || n.includes('goal') || n.includes('reti') || ['pts','pg','gf','gs','dr','pt','mvp'].includes(n)) return 'metric';
  if(n.includes('note') || n.includes('descrizione') || n.includes('commento')) return 'note';
  return 'text';
}
function findHighlightIndex(headers, highlightCandidates){
  if(!highlightCandidates) return -1;
  const list=Array.isArray(highlightCandidates)?highlightCandidates:[highlightCandidates];
  const normed=headers.map(h=>norm(h));
  for(const name of list){
    const nc=norm(name);
    const idx=normed.findIndex(h=>h===nc||h.includes(nc));
    if(idx>=0) return idx;
  }
  return -1;
}
/* Quante colonne iniziali restano fisse a sinistra durante lo scroll.
   La 1ª (posizione/sezione) è sempre fissa. La 2ª lo è se è il nome
   (squadra/giocatore) subito dopo, oppure se è lei il valore evidenziato.
   La 3ª lo è solo se è il valore evidenziato (es. Punti, Gol) e arriva
   subito dopo posizione+nome: così le colonne davvero importanti restano
   sempre leggibili per intero, e si scorre solo per leggere il resto. */
function stickyColumnCount(roles, highlightIdx){
  let count=1;
  if(roles.length>1){
    const leadIsLabel=roles[0]==='rank'||roles[0]==='section';
    const nameFollows=roles[1]==='team'||roles[1]==='person';
    if((leadIsLabel && nameFollows) || highlightIdx===1) count=2;
  }
  if(count===2 && roles.length>2 && highlightIdx===2) count=3;
  return count;
}
/* Misura la larghezza reale della 1ª (e 2ª) colonna fissa per posizionare
   esattamente di fianco quelle successive, e segnala se la tabella è più
   larga dello schermo (per mostrare il suggerimento "scorri"). */
function refreshTableScrollState(wrap){
  if(!wrap) return;
  const col1=wrap.querySelector('thead .col-sticky-1');
  const w1=col1?Math.ceil(col1.getBoundingClientRect().width):0;
  wrap.querySelectorAll('.col-sticky-2').forEach(c=>{ c.style.left=w1+'px'; });
  const col2=wrap.querySelector('thead .col-sticky-2');
  if(col2){
    const w2=Math.ceil(col2.getBoundingClientRect().width);
    wrap.querySelectorAll('.col-sticky-3').forEach(c=>{ c.style.left=(w1+w2)+'px'; });
  }
  const tbl=wrap.querySelector('table');
  if(tbl) wrap.classList.toggle('has-overflow', tbl.scrollWidth>wrap.clientWidth+1);
}
function refreshAllTablesScrollState(){
  document.querySelectorAll('.tableWrap').forEach(refreshTableScrollState);
}
let _tableResizeRaf=null;
window.addEventListener('resize',()=>{
  if(_tableResizeRaf) return;
  _tableResizeRaf=requestAnimationFrame(()=>{ _tableResizeRaf=null; refreshAllTablesScrollState(); });
});
function removeColumnsByNorm(tableRows, blockedNames){
  if(!tableRows || !tableRows.length) return tableRows;
  const blocked=new Set((blockedNames||[]).map(norm));
  const headers=tableRows[0]||[];
  const keep=headers.map((h,i)=>blocked.has(norm(h)) ? -1 : i).filter(i=>i>=0);
  if(keep.length===headers.length) return tableRows;
  return tableRows.map(row=>keep.map(i=>row[i]??''));
}
function buildTable(rows, tableId, imgType, priorityNames, highlightName){
  if(!rows||!rows.length) return buildEl('div','empty','Nessun dato disponibile.');
  let headers=rows[0];
  let body=rows.slice(1);
  const hasSearch=!!norm(state.search);
  if(hasSearch) body=body.filter(rowMatchesSearch);
  if(!body.length) return buildEl('div','empty',hasSearch?'Nessun risultato per la ricerca.':'Nessun dato disponibile.');
  const order=reorderIndices(headers,priorityNames);
  if(order){ headers=order.map(i=>headers[i]); body=body.map(r=>order.map(i=>r[i])); }
  if(!tableId){ tableId='tbl_'+(++_tableCounter); }
  const sort=state.sortState[tableId]||{col:-1,dir:'asc'};
  const nameColIdx = imgType ? findNameColIndex(headers, imgType) : -1;
  const columnRoles=headers.map((h,i)=>tableColumnRole(h,i,imgType,nameColIdx));
  const highlightIdx=findHighlightIndex(headers,highlightName);
  const stickyCount=stickyColumnCount(columnRoles,highlightIdx);

  let sortedBody=[...body];
  if(sort.col>=0){
    sortedBody.sort((a,b)=>{
      const av=a[sort.col]??'', bv=b[sort.col]??'';
      const an=num(av),bn=num(bv);
      const cmp=(an!==0||bn!==0)?(an-bn):String(av).localeCompare(String(bv),'it');
      return sort.dir==='asc'?cmp:-cmp;
    });
  }

  const outer=document.createElement('div');
  const wrap=document.createElement('div'); wrap.className='tableWrap';
  const tbl=document.createElement('table');
  tbl.className='tbl-aligned';
  const thead=document.createElement('thead');
  const hrow=document.createElement('tr');
  headers.forEach((h,i)=>{
    const th=document.createElement('th');
    th.dataset.colRole=columnRoles[i];
    if(i<stickyCount) th.classList.add('col-sticky-'+(i+1));
    if(i===stickyCount-1) th.classList.add('col-sticky-edge');
    if(i===highlightIdx) th.classList.add('col-highlight');
    const span=document.createElement('span'); span.textContent=fixItalianAccents(prettyColumnName(h||''));
    const arrow=document.createElement('i'); arrow.className='sort-arrow';
    th.appendChild(span); th.appendChild(arrow);
    if(sort.col===i) th.classList.add(sort.dir==='asc'?'sort-asc':'sort-desc');
    th.onclick=()=>{
      if(sort.col===i){ state.sortState[tableId]={col:i,dir:sort.dir==='asc'?'desc':'asc'}; }
      else { state.sortState[tableId]={col:i,dir:'asc'}; }
      renderActiveSection();
    };
    hrow.appendChild(th);
  });
  thead.appendChild(hrow); tbl.appendChild(thead);
  const tbody=document.createElement('tbody');
  sortedBody.forEach(row=>{
    const tr=document.createElement('tr');
    headers.forEach((_,i)=>{
      const td=document.createElement('td');
      td.dataset.colRole=columnRoles[i];
      if(i<stickyCount) td.classList.add('col-sticky-'+(i+1));
      if(i===stickyCount-1) td.classList.add('col-sticky-edge');
      if(i===highlightIdx) td.classList.add('col-highlight');
      if(imgType && i===nameColIdx){
        const cell=document.createElement('div'); cell.className='name-cell';
        const name=row[i]??'';
        const cls=imgType==='team'?'tbl-logo':'tbl-avatar';
        cell.appendChild(imgOrInitialEl(imgType,name,cls));
        const labelEl=document.createElement(imgType==='player'?'button':'span');
        if(imgType==='player'){
          labelEl.type='button';
          labelEl.className='player-link player-link-inline';
          labelEl.onclick=(ev)=>{ ev.stopPropagation(); openPlayerProfile(name); };
          labelEl.title='Apri scheda giocatore';
        }
        labelEl.textContent=name;
        cell.appendChild(labelEl);
        td.appendChild(cell);
      } else {
        td.textContent=fixItalianAccents(row[i]??'');
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody); wrap.appendChild(tbl); outer.appendChild(wrap);
  const hint=document.createElement('div'); hint.className='scroll-hint'; hint.textContent='⟷ Scorri per leggere altri dati';
  outer.appendChild(hint);
  requestAnimationFrame(()=>refreshTableScrollState(wrap));
  return outer;
}
function buildEl(tag,cls,text){ const el=document.createElement(tag); el.className=cls; if(text) el.textContent=fixItalianAccents(text); return el; }
