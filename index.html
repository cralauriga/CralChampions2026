<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CRAL Champions</title>
  <style>
    /* ── Tema chiaro ── */
    :root {
      --bg:#eef3f9;--panel:#fff;--ink:#142033;--muted:#667085;--line:#dbe5f2;
      --blue:#0f5aa8;--dark:#071d3a;--soft:#f3f7fc;--gold:#f5b942;
      --green:#12805c;--red:#b42318;--shadow:rgba(7,29,58,.10);
    }
    /* ── Tema scuro ── */
    [data-theme="dark"] {
      --bg:#0d1520;--panel:#162033;--ink:#e2eaf5;--muted:#8fa4be;--line:#243450;
      --blue:#3b82f6;--dark:#0a1628;--soft:#1a2d47;--gold:#f5b942;
      --green:#34d399;--red:#f87171;--shadow:rgba(0,0,0,.35);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--ink);transition:background .3s,color .3s}
    .wrap{max-width:1280px;margin:auto;padding:24px}
    /* ── Hero ── */
    .hero{background:linear-gradient(135deg,var(--dark),var(--blue));color:#fff;border-radius:26px;padding:30px;margin-bottom:18px;box-shadow:0 14px 36px var(--shadow)}
    .hero-top{display:flex;gap:20px;align-items:center}
    .hero-logo{width:72px;height:72px;border-radius:18px;object-fit:contain;background:rgba(255,255,255,.12);padding:6px;flex:0 0 auto;display:flex;align-items:center;justify-content:center}
    .hero-logo img{width:100%;height:100%;object-fit:contain;border-radius:12px}
    .hero-logo svg{width:100%;height:100%}
    .hero h1{margin:0;font-size:clamp(24px,4vw,48px);letter-spacing:.02em}
    .hero p{margin:8px 0 0;color:#dbeaff;font-size:17px}
    /* ── Banner errore avanzato ── */
    .err-section{margin:6px 0 0}
    .err-section summary{cursor:pointer;font-weight:700;padding:4px 0;list-style:none}
    .err-section summary::before{content:'▶ ';font-size:11px}
    .err-section[open] summary::before{content:'▼ '}
    .err-item{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #fecaca;font-size:13px;font-weight:400;align-items:flex-start}
    .err-item:last-child{border-bottom:0}
    .err-icon{flex:0 0 18px;text-align:center}
    .err-detail{color:#6b2020}
    .err-fix{margin-top:3px;color:#7c3030;font-style:italic}
    /* ── Toolbar ── */
    .toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px;align-items:center}
    .btn,.fileLabel{border:0;border-radius:14px;padding:11px 15px;background:#fff;color:#0f376f;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;gap:8px;align-items:center;font-size:14px}
    .btn.secondary{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.28)}
    .btn.icon-btn{padding:10px 12px;background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.28);border-radius:14px;font-size:18px;line-height:1}
    input[type=file]{display:none}
    /* ── Banner errore ── */
    #errorBanner{display:none;background:#fef2f2;border:1px solid #fecaca;border-radius:14px;padding:14px 18px;margin-bottom:14px;color:var(--red);font-weight:600}
    #errorBanner ul{margin:6px 0 0 18px;font-weight:400;font-size:13px}
    /* ── Status ── */
    .status{font-size:13px;color:#dbeaff;margin-left:auto}
    /* ── Tabs ── */
    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0}
    .tab{border:1px solid var(--line);background:var(--panel);border-radius:999px;padding:10px 14px;cursor:pointer;font-weight:700;color:var(--blue);transition:background .15s,color .15s}
    .tab.active{background:var(--blue);color:#fff;border-color:var(--blue)}
    /* ── Grid ── */
    .grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:16px;box-shadow:0 8px 22px var(--shadow)}
    .stat .n{font-size:34px;font-weight:800;color:var(--blue)}
    .stat .l{color:var(--muted);font-size:13px;text-transform:uppercase;font-weight:800}
    /* ── Sezioni ── */
    .section{display:none}.section.active{display:block}
    h2{margin:0 0 14px;color:var(--blue);font-size:26px}
    .upper{text-transform:uppercase}
    .hint{color:var(--muted);font-size:14px;line-height:1.5}
    /* ── Ricerca ── */
    .search{width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:14px;margin:0 0 14px;font-size:15px;background:var(--panel);color:var(--ink)}
    /* ── Tabelle ── */
    .tableWrap{position:relative;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior-x:contain;border-radius:16px;border:1px solid var(--line);background:var(--panel)}
    table{width:100%;border-collapse:collapse}
    th,td{padding:10px 13px;border-bottom:1px solid var(--line);text-align:left;white-space:nowrap}
    table.tbl-aligned th,table.tbl-aligned td{overflow:hidden;text-overflow:ellipsis}
    table.tbl-aligned th[data-col-role=rank],table.tbl-aligned td[data-col-role=rank]{min-width:46px;max-width:60px;text-align:center}
    table.tbl-aligned th[data-col-role=metric],table.tbl-aligned td[data-col-role=metric]{min-width:54px;max-width:80px;text-align:center;font-variant-numeric:tabular-nums}
    table.tbl-aligned th[data-col-role=round],table.tbl-aligned td[data-col-role=round]{min-width:64px;max-width:100px;text-align:center}
    table.tbl-aligned th[data-col-role=team],table.tbl-aligned td[data-col-role=team],
    table.tbl-aligned th[data-col-role=person],table.tbl-aligned td[data-col-role=person]{min-width:130px;max-width:220px}
    table.tbl-aligned th[data-col-role=date],table.tbl-aligned td[data-col-role=date]{min-width:84px;max-width:120px}
    table.tbl-aligned th[data-col-role=match],table.tbl-aligned td[data-col-role=match]{min-width:150px;max-width:230px}
    table.tbl-aligned th[data-col-role=section],table.tbl-aligned td[data-col-role=section]{min-width:100px;max-width:160px}
    table.tbl-aligned th[data-col-role=note],table.tbl-aligned td[data-col-role=note]{min-width:130px;max-width:230px}
    table.tbl-aligned th[data-col-role=text],table.tbl-aligned td[data-col-role=text]{min-width:90px;max-width:170px}
    th{background:var(--soft);font-size:12px;text-transform:none;color:var(--muted);cursor:pointer;user-select:none;position:relative}
    th:hover{background:var(--line)}
    th .sort-arrow{margin-left:4px;opacity:.4;font-style:normal}
    th.sort-asc .sort-arrow,th.sort-desc .sort-arrow{opacity:1}
    th.sort-asc .sort-arrow::after{content:'▲'}
    th.sort-desc .sort-arrow::after{content:'▼'}
    th:not(.sort-asc):not(.sort-desc) .sort-arrow::after{content:'⇅'}
    tbody tr:nth-child(even) td{background:var(--soft)}
    tr:hover td{background:var(--line)}
    
    /* DISATTIVA DEFINITIVAMENTE LE COLONNE FISSE */
    .tbl-aligned .col-sticky-1,
    .tbl-aligned .col-sticky-2,
    .tbl-aligned .col-sticky-3{
        position: static !important;
        left: auto !important;
        right: auto !important;
        z-index: auto !important;
        box-shadow: none !important;
    }
    .tbl-aligned thead .col-sticky-1,.tbl-aligned thead .col-sticky-2,.tbl-aligned thead .col-sticky-3{background:inherit}
    .tbl-aligned tr:hover .col-sticky-1,.tbl-aligned tr:hover .col-sticky-2,.tbl-aligned tr:hover .col-sticky-3{background:inherit}
    .tbl-aligned .col-sticky-edge{box-shadow:none}
    
    .tbl-aligned th.col-highlight{color:var(--blue);background:rgba(15,90,168,.12)}
    .tbl-aligned td.col-highlight{font-weight:800;color:var(--blue);background:rgba(15,90,168,.07)}
    [data-theme="dark"] .tbl-aligned th.col-highlight{background:rgba(59,130,246,.18)}
    [data-theme="dark"] .tbl-aligned td.col-highlight{background:rgba(59,130,246,.13)}
    
    .tableWrap{
      scroll-behavior:smooth;
      -webkit-overflow-scrolling:touch;
      scrollbar-width:thin;
    }
    .tableWrap.has-overflow::after{
      content:'⇠ Scorri';
      position:sticky;
      right:8px;
      float:right;
      bottom:8px;
      z-index:5;
      font-size:11px;
      font-weight:700;
      padding:4px 8px;
      border-radius:999px;
      background:rgba(15,90,168,.12);
      color:var(--blue);
      pointer-events:none;
    }
    @media(max-width:560px){
      .tableWrap{
        border-radius:14px;
      }
      .tableWrap.has-overflow{
        background:
          linear-gradient(to left, rgba(15,90,168,.10), transparent 24px) right center/24px 100% no-repeat,
          var(--panel);
      }
    }

    .scroll-hint{display:none;align-items:center;gap:6px;justify-content:center;font-size:12px;color:var(--muted);padding:7px 2px 0}
    .tableWrap.has-overflow + .scroll-hint{display:flex}
    .pill{display:inline-block;border-radius:999px;padding:4px 9px;background:#eef4ff;color:var(--blue);font-weight:800}
    .tbl-avatar-col{width:1%;white-space:nowrap}
    .tbl-logo,.tbl-avatar{width:30px;height:30px;border-radius:8px;object-fit:cover;background:#dbe7f6;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:11px;color:var(--blue);flex:0 0 auto}
    .tbl-avatar{border-radius:50%}
    .mini-logo{width:26px;height:26px;border-radius:7px;object-fit:cover;background:#dbe7f6;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:10px;color:var(--blue);flex:0 0 auto}
    .name-cell{display:flex;align-items:center;gap:9px;min-width:0}
    .name-cell span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
    .teams{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
    .teamCard{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:16px}
    .teamHead{display:flex;gap:12px;align-items:center;margin-bottom:12px}
    .logo,.avatar{width:58px;height:58px;border-radius:16px;object-fit:cover;background:#dbe7f6;display:flex;align-items:center;justify-content:center;font-weight:900;color:var(--blue);flex:0 0 auto}
    .avatar{width:44px;height:44px;border-radius:50%;font-size:13px}
    .img-placeholder{position:relative;overflow:hidden;color:transparent}
    .img-placeholder::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.42),transparent);transform:translateX(-100%);animation:imgLoading 1.15s infinite}

    .is-empty-fallback{color:transparent}
    .is-empty-fallback::before{content:'';display:block;width:38%;height:38%;border-radius:50%;background:rgba(15,90,168,.18)}
    @keyframes imgLoading{to{transform:translateX(100%)}}
    .player{display:flex;gap:10px;align-items:center;padding:8px 0;border-top:1px solid var(--line)}
    .player b{display:block}
    .player-name{font-weight:600}
    .player.captain .player-name{font-weight:900}
    .captain-armband{display:inline-flex;align-items:center;justify-content:center;margin-left:7px;width:22px;height:16px;border-radius:4px;background:var(--gold);color:#071d3a;font-size:11px;font-weight:900;line-height:1;box-shadow:inset 0 0 0 2px rgba(7,29,58,.15)}
    .captain-armband::before{content:'C'}
    .small{font-size:12px;color:var(--muted)}
    .match{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px;border-bottom:1px solid var(--line)}
    .match:last-child{border-bottom:0}
    .score{font-weight:900;font-size:18px;color:var(--blue);flex:0 0 auto}
    .match-teams{display:flex;align-items:center;gap:8px;flex:1 1 auto;min-width:0}
    .match-team{display:flex;align-items:center;gap:8px;min-width:0}
    .match-vs{color:var(--muted);font-weight:700;font-size:12px;flex:0 0 auto}
    .match-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .match-meta{display:flex;flex-direction:column;gap:2px;min-width:0}
    .riepilogo-card{padding:18px}
    .riepilogo-kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:10px;margin:12px 0 16px}
    .riepilogo-kpi{padding:10px 12px;border-radius:16px;box-shadow:none;min-height:72px;display:flex;flex-direction:column;justify-content:center}
    .riepilogo-kpi .n{font-size:24px;line-height:1.08;letter-spacing:-.02em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .riepilogo-kpi.is-match-max{grid-column:span 3}
    .riepilogo-kpi.is-match-max .n{font-size:22px;white-space:normal;overflow:visible;text-overflow:clip;word-break:normal;overflow-wrap:anywhere}
    .riepilogo-kpi.is-scorer{min-height:72px;display:grid;grid-template-columns:minmax(0,1fr) 64px;gap:12px;align-items:center;justify-content:stretch}
    .riepilogo-kpi.is-scorer .riepilogo-kpi-text{min-width:0}
    .riepilogo-kpi.is-scorer .n{font-size:22px;white-space:normal;overflow:visible;text-overflow:clip;word-break:normal;overflow-wrap:anywhere}
    .riepilogo-kpi-scorer-photo{width:58px;height:58px;border-radius:15px;justify-self:end;object-fit:cover;object-position:center;background:var(--soft);border:1px solid var(--line);box-shadow:0 8px 18px var(--shadow);display:none}
    .riepilogo-kpi-scorer-photo.is-loaded{display:block}
    .riepilogo-kpi .l{font-size:11px;letter-spacing:.04em;margin-top:4px}
    .riepilogo-kpi.is-wide{grid-column:span 2}
    .riepilogo-matches{border-radius:18px;overflow:hidden}
    .riepilogo-match{padding:16px 14px;gap:18px;align-items:flex-start;background:var(--panel)}
    .riepilogo-match .match-teams{gap:10px;margin-bottom:3px}
    .riepilogo-match .match-team{gap:10px;max-width:45%}
    .riepilogo-match .mini-logo{width:34px;height:34px;border-radius:10px;font-size:11px}
    .riepilogo-match .match-name{font-size:18px;font-weight:800;color:var(--ink)}
    .riepilogo-match .match-vs{font-size:13px;text-transform:uppercase;letter-spacing:.04em}
    .riepilogo-match .score{font-size:30px;line-height:1;font-variant-numeric:tabular-nums;padding-top:4px;min-width:88px;text-align:right}
    .riepilogo-match .small{font-size:12px;line-height:1.35}
    .chart-card{position:relative;overflow:hidden;border-radius:22px;background:linear-gradient(145deg,var(--panel),rgba(15,90,168,.06));}
    .chart-card::before{content:'';position:absolute;inset:-90px -70px auto auto;width:210px;height:210px;border-radius:50%;background:radial-gradient(circle,rgba(15,90,168,.16),transparent 68%);pointer-events:none}
    .chart-card h2{display:flex;align-items:center;gap:8px;margin-bottom:8px}
    .chart-card h2::before{content:attr(data-icon);font-size:18px;color:var(--gold)}
    .chart-container{position:relative;width:100%;height:276px;margin-top:4px}
    .chart-label-strip{position:relative;height:58px;margin-top:2px;padding:0;overflow:visible}
    .chart-label-item{position:absolute;top:0;transform:translateX(-50%);width:54px;display:flex;justify-content:center;align-items:flex-start}
    .chart-label-img{width:44px;height:44px;background:#fff;border:2px solid rgba(255,255,255,.95);box-shadow:0 7px 16px var(--shadow);display:block}
    .chart-label-img.player{border-radius:14px;object-fit:cover;object-position:center center;padding:0}
    .chart-label-img.team{border-radius:12px;padding:3px;object-fit:contain}
    .chart-label-text{font-size:10px;color:var(--muted);font-weight:800;text-align:center;line-height:1.05;max-width:54px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}
    canvas{border-radius:14px}
    .empty{padding:18px;background:var(--panel);border:1px dashed var(--line);border-radius:16px;color:var(--muted)}
    .error{color:var(--red);font-weight:700}
    .ok{color:var(--green);font-weight:700}
    @media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}.status{margin-left:0;width:100%}.riepilogo-kpi.is-wide,.riepilogo-kpi.is-match-max{grid-column:span 1}}
    @media(max-width:560px){.wrap{padding:14px}.grid{grid-template-columns:1fr}.hero{padding:22px}.match{display:block}.score{margin:6px 0}.riepilogo-match .match-team{max-width:none}.riepilogo-match .match-name{font-size:16px}.riepilogo-match .score{text-align:left;font-size:26px;min-width:0}.riepilogo-kpi-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.riepilogo-kpi.is-wide,.riepilogo-kpi.is-match-max,.riepilogo-kpi.is-scorer{grid-column:1/-1}.tableWrap{font-size:13px}th,td{padding:9px 9px}table.tbl-aligned th[data-col-role=rank],table.tbl-aligned td[data-col-role=rank]{min-width:40px;max-width:54px}table.tbl-aligned th[data-col-role=section],table.tbl-aligned td[data-col-role=section]{min-width:70px;max-width:110px}table.tbl-aligned th[data-col-role=team],table.tbl-aligned td[data-col-role=team],table.tbl-aligned th[data-col-role=person],table.tbl-aligned td[data-col-role=person]{min-width:118px;max-width:150px}table.tbl-aligned th[data-col-role=metric],table.tbl-aligned td[data-col-role=metric]{min-width:48px;max-width:68px}.tbl-logo,.tbl-avatar{width:24px;height:24px}.mini-logo{width:22px;height:22px}.name-cell{gap:7px}}
    @media print{.toolbar,.tabs,.search,#errorBanner{display:none}.section{display:block}.wrap{max-width:none}.card,.hero{box-shadow:none}}
    @media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div class="hero-top">
      <div class="hero-logo" id="heroLogoWrap">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Logo CRAL">
          <circle cx="32" cy="32" r="30" fill="rgba(255,255,255,.15)" stroke="rgba(255,255,255,.4)" stroke-width="2"/>
          <path d="M32 10 L38 24 H54 L42 33 L46 47 L32 38 L18 47 L22 33 L10 24 H26 Z" fill="#f5b942" opacity=".9"/>
          <text x="32" y="56" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="900" fill="rgba(255,255,255,.8)">CRAL</text>
        </svg>
      </div>
      <div>
        <h1 id="siteTitle">CRAL Champions</h1>
        <p id="siteSubtitle">Sito statico torneo</p>
      </div>
    </div>
    <div class="toolbar">
      <button class="btn secondary" onclick="window.print()">🖨 Stampa / PDF</button>
      <button class="btn icon-btn" id="btnTheme" title="Cambia tema" aria-label="Cambia tema chiaro/scuro">🌙</button>
      <span class="status" id="status">Avvio...</span>
    </div>
  </div>

  <div id="errorBanner" role="alert" aria-live="polite" style="display:none;background:#fef2f2;border:1px solid #fecaca;border-radius:14px;padding:14px 18px;margin-bottom:14px;color:var(--red);font-weight:600">
    <div>⚠️ Trovati <span id="errCount">0</span> problema/i durante il caricamento dei CSV</div>
    <div id="errGroups"></div>
  </div>

  <input class="search" id="search" placeholder="Cerca squadra, giocatore, partita…" aria-label="Ricerca globale" />
  <div class="tabs" id="tabs" role="tablist"></div>

  <section id="home"        class="section active" role="tabpanel"></section>
  <section id="classifiche" class="section"        role="tabpanel"></section>
  <section id="statistiche" class="section"        role="tabpanel"></section>
  <section id="squadre"     class="section"        role="tabpanel"></section>
  <section id="calendario"  class="section"        role="tabpanel"></section>
  <section id="risultati"   class="section"        role="tabpanel"></section>
  <section id="riepilogo"   class="section"        role="tabpanel"></section>
</div>

<script>
const DEFAULT_TITLE    = 'CRAL Champions - Auriga 2026';
const DEFAULT_SUBTITLE = 'Classifiche, calendario, risultati e statistiche giocatori';
const DEFAULT_FILES    = [
  'config.csv','manifest.csv','classifica_squadre.csv','classifica_marcatori.csv',
  'classifica_mvp.csv','classifica_portieri.csv',
  'risultati_partite.csv','risultati.csv','partite.csv',
  'calendario_andata_ritorno.csv','calendario.csv',
  'riepilogo_giornate.csv'
];
const TABS = [
  ['home','🏠 Home'],['classifiche','🏆 Classifiche'],['statistiche','📊 Statistiche'],
  ['squadre','👕 Squadre'],['calendario','📅 Calendario'],['risultati','⚽ Risultati'],
  ['riepilogo','📝 Riepilogo giornate']
];

let state = {
  config: { titolo: DEFAULT_TITLE, sottotitolo: DEFAULT_SUBTITLE },
  files: {}, rows: {}, imageFiles: {}, imageURLs: {}, imageAliases: {},
  imagesReady: true,
  search: '', activeTab: 'home',
  selectedRiepilogoGiornata: '',
  sortState: {}
};
let loadErrors = [];
let manualLoadActive = false;

function norm(s){ return String(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/&/g,'e').replace(/[^a-z0-9]/g,''); }

function fixItalianAccents(s){
  let out=String(s??'');
  const replaceWord=(word,repl)=>{
    out=out.replace(new RegExp('\\b'+word+'\\b','gi'),m=>{
      if(m===m.toUpperCase()) return repl.toUpperCase();
      if(m[0]===m[0].toUpperCase()) return repl.charAt(0).toUpperCase()+repl.slice(1);
      return repl;
    });
  };
  replaceWord('piu','più');
  replaceWord('perche','perché');
  replaceWord('poiche','poiché');
  replaceWord('finche','finché');
  replaceWord('cosi','così');
  replaceWord('gia','già');
  replaceWord('puo','può');
  replaceWord('cioe','cioè');
  replaceWord('qualita','qualità');
  replaceWord('quantita','quantità');
  replaceWord('citta','città');
  replaceWord('autogoal','autogol');
  out=out.replace(/\bgoal\b/gi,m=>m===m.toUpperCase()?'GOL':(m[0]===m[0].toUpperCase()?'Gol':'gol'));
  out=out.replace(/(^|\s)e'(?=\s|$)/gi,(m,p)=>p+(m.trim()[0]==='E'?'È':'è'));
  out=out.replace(/n'e/gi, m=>m[0]==='N'?"N'è":"n'è");
  return out;
}
function smartSpace(s){
  return String(s||'')
    .replace(/&/g,' & ')
    .replace(/([a-z\u00e0-\u00fc])([A-Z])/g,'$1 $2')
    .replace(/([A-Z]+)([A-Z][a-z])/g,'$1 $2')
    .replace(/\s+/g,' ')
    .trim();
}
function prettyFileName(f){ return smartSpace(f.replace(/\.csv$/i,'').replace(/^squadra_/i,'Squadra ').replace(/_/g,' ')); }

function prettyColumnName(header){
  const raw=String(header||'').trim();
  if(!raw) return '';
  const n=norm(raw);
  const map={
    squadracasa:'Squadra casa', teamcasa:'Squadra casa', casa:'Casa', home:'Casa', squadra1:'Squadra 1',
    squadratrasferta:'Squadra trasferta', squadraospite:'Squadra ospite', trasferta:'Trasferta', ospite:'Ospite', away:'Trasferta', squadra2:'Squadra 2',
    golcasa:'Gol casa', reticasa:'Gol casa', goalcasa:'Gol casa', gc:'GC', golsquadracasa:'Gol casa',
    goltrasferta:'Gol trasferta', retiTrasferta:'Gol trasferta', goaltrasferta:'Gol trasferta', gt:'GT', golsquadratrasferta:'Gol trasferta',
    risultato:'Risultato', score:'Risultato', esito:'Esito', vincitore:'Vincitore', giornata:'Giornata', turno:'Turno', data:'Data', giorno:'Giorno', note:'Note',
    squadra:'Squadra', team:'Squadra', teamcode:'Squadra', teamname:'Squadra', partitegiocate:'PG', giocate:'PG', pg:'PG', vinte:'V', vittorie:'V', pareggiate:'N', pareggi:'N', perse:'P', sconfitte:'P',
    golfatti:'GF', golsegnati:'GF', retifatte:'GF', golsquadra:'Gol squadra', golsubiti:'GS', retisubite:'GS', differenzareti:'DR', diffreti:'DR', dr:'DR',
    punti:'Punti', pts:'Punti', point:'Punti', points:'Punti', puntifinali:'Punti finali', puntitotali:'Punti totali', puntioriginali:'Punti originali', penalita:'Penalità', notapenalita:'Nota penalità', notepenalita:'Note penalità',
    portiere:'Portiere', migliorportiere:'Miglior portiere', puntiportiere:'Punti PT', puntipt:'Punti PT', ptportiere:'Punti PT',
    cleansheet:'Clean sheet', cleansheets:'Clean sheet', imbattuto:'Clean sheet', imbattibilita:'Imbattibilità', golsubitiportiere:'Gol subiti PT',
    giocatore:'Giocatore', calciatore:'Giocatore', player:'Giocatore', playername:'Giocatore', playernome:'Giocatore', nomeplayer:'Giocatore', nomegiocatore:'Giocatore', nomecompleto:'Nome completo', cognomeenome:'Cognome e nome',
    nome:'Nome', cognome:'Cognome', ruolo:'Ruolo', posizione:'Pos.', numero:'Numero', maglia:'Maglia',
    gol:'Gol', goal:'Gol', reti:'Gol', golgiornata:'Gol giornata', retigiornata:'Gol giornata', goalgiornata:'Gol giornata',
    assist:'Assist', autogol:'Autogol', autogoal:'Autogol', autoreti:'Autogol', mvp:'MVP', puntimvp:'Punti MVP',
    presenze:'Presenze', partite:'Partite', mediagol:'Media gol', mediagolpartita:'Media gol/partita',
    sezione:'Sezione', statistica:'Statistica', valore:'Valore', totale:'Totale', categoria:'Categoria', descrizione:'Descrizione',
    marcatoricasa:'Marcatori casa', marcatoritrasferta:'Marcatori trasferta', marcatore:'Marcatore', marcatori:'Marcatori',
    totalemarcatoregiornata:'Totale marcatore giornata', voce:'Voce', voci:'Voci', dato:'Dato', etichetta:'Etichetta'
  };
  if(map[n]) return map[n];

  const tokens=['player','team','code','squadra','trasferta','ospite','giornata','originali','penalita','penalità','finali','totali','punti','portiere','giocatore','marcatori','marcatore','miglior','differenza','partite','partita','presenze','statistica','valore','cognome','numero','subiti','fatti','clean','sheet','assist','autogol','ruolo','media','goal','casa','note','nota','nome','reti','gol','mvp','pg','gf','gs','dr','pt','v','n','p'];
  let compact=n;
  const parts=[];
  while(compact){
    const found=tokens.find(t=>compact.startsWith(t));
    if(found){
      parts.push(found);
      compact=compact.slice(found.length);
      continue;
    }
    const nextIndexes=tokens.map(t=>compact.indexOf(t)).filter(i=>i>0);
    const next=nextIndexes.length ? Math.min(...nextIndexes) : compact.length;
    parts.push(compact.slice(0,next));
    compact=compact.slice(next);
  }
  if(parts.length>1){
    let joined=parts.join(' ')
      .replace(/\bpt\b/gi,'PT')
      .replace(/\bmvp\b/gi,'MVP')
      .replace(/\bpg\b/gi,'PG')
      .replace(/\bgf\b/gi,'GF')
      .replace(/\bgs\b/gi,'GS')
      .replace(/\bdr\b/gi,'DR')
      .replace(/\bpenalita\b/gi,'penalità');
    return joined.charAt(0).toUpperCase()+joined.slice(1);
  }

  const spaced=smartSpace(raw.replace(/_/g,' '));
  return spaced.charAt(0).toUpperCase()+spaced.slice(1);
}

function esc(s){ const t=document.createElement('span'); t.textContent=String(s??''); return t.innerHTML; }
function initials(s){
  const raw = Array.isArray(s)
    ? (s.find(x=>String(x||'').trim() && String(x||'').trim()!=='?') || '')
    : String(s||'');
  const text = smartSpace(raw)
    .replace(/\?/g,' ')
    .replace(/\([^)]*\)/g,' ')
    .replace(/\b\d+\b/g,' ')
    .trim();
  if(!text) return '';
  const stop = new Set(['di','de','del','della','dei','degli','da','dal','dallo','la','lo','le','il','i','gli']);
  const parts = text.split(/\s+/).filter(x=>x && !stop.has(x.toLowerCase()));
  if(!parts.length) return '';
  if(parts.length===1) return parts[0].slice(0,2).toUpperCase();
  return (parts[0][0] + parts[parts.length-1][0]).toUpperCase();
}
function setStatus(msg,good=false){ const el=document.getElementById('status'); el.innerHTML=good?`<span class="ok">${esc(msg)}</span>`:esc(msg); }
function cleanLoadErrorName(err){ return String(err||'').split(' — ')[0].trim(); }
function dataLoadStatus(csvCount){
  const missing=[...new Set(loadErrors.map(cleanLoadErrorName).filter(Boolean))];
  if(missing.length){
    return `Caricamento dati completato da ${csvCount} file; verificare file ${missing.join(', ')}`;
  }
  return 'Caricamento dati completato';
}
function sepFor(line){ const semi=(line.match(/;/g)||[]).length,comma=(line.match(/,/g)||[]).length; return semi>=comma?';':','; }

function parseCsv(text){
  text=String(text||'').replace(/^\uFEFF/,'');
  if(!text.trim()) return [];
  const sep=sepFor(text.split(/\r?\n/).find(l=>l.trim())||'');
  const rows=[];
  let row=[],val='',q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i],n=text[i+1];
    if(c==='"'&&q&&n==='"'){ val+='"'; i++; }
    else if(c==='"'){ q=!q; }
    else if(c===sep&&!q){ row.push(val.trim()); val=''; }
    else if((c==='\n'||c==='\r')&&!q){
      if(val!==''||row.length){ row.push(val.trim()); rows.push(row); row=[]; val=''; }
      if(c==='\r'&&n==='\n') i++;
    }
    else val+=c;
  }
  if(val!==''||row.length){ row.push(val.trim()); rows.push(row); }
  const filtered=rows.filter(r=>r.some(x=>String(x).trim()!==''));
  const maxCols=Math.max(0,...filtered.map(r=>r.length));
  return filtered.map(r=>{
    while(r.length<maxCols) r.push('');
    return r;
  });
}
function rowsToObjects(rows){
  if(!rows||!rows.length) return [];
  const h=rows[0].map(x=>String(x||'').trim());
  return rows.slice(1).map(r=>Object.fromEntries(h.map((k,i)=>[k,r[i]??''])));
}
function col(obj,names){
  const keys=Object.keys(obj||{});
  for(const n of names){
    const nk=norm(n);
    const k=keys.find(x=>norm(x)===nk||norm(x).includes(nk));
    if(k) return obj[k];
  }
  return '';
}
function num(x){ const n=parseFloat(String(x||'0').replace(',','.').replace(/[^0-9.-]/g,'')); return Number.isFinite(n)?n:0; }

function fileKind(f){
  const n=norm(f);
  if(n.includes('classificasquadre')||n.includes('classificasquadre')) return 'classifica_squadre';
  if(n.includes('marcatore')||n.includes('marcatori')) return 'classifica_marcatori';
  if(n.includes('mvp')) return 'classifica_mvp';
  if(n.includes('portiere')||n.includes('portieri')) return 'classifica_portieri';
  if(n.includes('partite')||n.includes('risultati')||n.includes('calendario')) return 'partite';
  if(n.includes('riepilogo')) return 'riepilogo_giornate';
  if(n.includes('config')) return 'config';
  if(n.includes('manifest')) return 'manifest';
  if(n.startsWith('squadra_')) return 'squadra_dettaglio';
  return '';
}

function safeFileText(file, rel){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=()=>resolve(r.result);
    r.onerror=()=>reject(r.error);
    r.readAsText(file,'utf-8');
  });
}

function applyConfig(){
  const row=state.rows['config.csv'];
  if(row && row.length>1){
    const obj=rowsToObjects(row)[0];
    state.config.titolo=col(obj,['titolo','title'])||DEFAULT_TITLE;
    state.config.sottotitolo=col(obj,['sottotitolo','subtitle'])||DEFAULT_SUBTITLE;
  }
}

function updateTitle(){
  document.getElementById('siteTitle').textContent=state.config.titolo;
  document.getElementById('siteSubtitle').textContent=state.config.sottotitolo;
}

function renderTabs(){
  const container=document.getElementById('tabs');
  container.innerHTML='';
  TABS.forEach(([id,label])=>{
    const btn=document.createElement('button');
    btn.className='tab'+(state.activeTab===id?' active':'');
    btn.textContent=label;
    btn.setAttribute('role','tab');
    btn.setAttribute('aria-selected',state.activeTab===id?'true':'false');
    btn.onclick=()=>{
      state.activeTab=id;
      renderTabs();
      renderActiveSection();
    };
    container.appendChild(btn);
  });
}

function refreshAfterManualLoad(csvCount,imgCount){
  manualLoadActive=true;
  state.imagesReady=true;
  loadErrors=[];
  document.getElementById('errorBanner').style.display='none';
  applyConfig();
  updateTitle();
  renderTabs();
  renderActiveSection();
  setStatus(dataLoadStatus(csvCount), true);
}

function processImageFilesLater(files){
  // Caricamento asincrono immagini fittizie/locali per non bloccare la UI
  setTimeout(()=>{
    files.forEach(f=>{
      const url=URL.createObjectURL(f);
      state.imageURLs[f.name]=url;
    });
    renderActiveSection();
  },100);
}

/* ══════════════════════════════════
   LOGICA DELLE SEZIONI E RENDERING
   ══════════════════════════════════ */
function renderActiveSection(){
  const sections=document.querySelectorAll('.section');
  sections.forEach(s=>{
    if(s.id===state.activeTab) s.classList.add('active');
    else s.classList.remove('active');
  });
  
  const activeSec=document.getElementById(state.activeTab);
  if(!activeSec) return;
  
  if(!Object.keys(state.files).length){
    activeSec.innerHTML='<div class="empty">Nessun dato caricato. Seleziona una cartella contenente i file CSV del torneo per iniziare.</div>';
    return;
  }
  
  activeSec.innerHTML=`<h2>${TABS.find(t=>t[0]===state.activeTab)[1]}</h2>`;
  
  // Renderizza dinamicamente in base alla tab attiva
  if(state.activeTab==='home'){
    activeSec.innerHTML+=`
      <div class="card">
        <h3>Benvenuto nel portale ${esc(state.config.titolo)}</h3>
        <p class="hint">${esc(state.config.sottotitolo)}</p>
        <div class="grid">
          <div class="card stat"><div class="n">${Object.keys(state.files).length}</div><div class="l">File CSV</div></div>
        </div>
      </div>`;
  } else {
    activeSec.innerHTML+=`<div class="empty">Contenuto sezione "${state.activeTab}" pronto per la visualizzazione dei dati.</div>`;
  }
}

/* ══════════════════════════════════
   EVENTI E INIZIALIZZAZIONE
   ══════════════════════════════════ */
document.addEventListener('DOMContentLoaded',()=>{
  // Gestore Tema Scuro
  const btnTheme=document.getElementById('btnTheme');
  const savedTheme=localStorage.getItem('theme')||'light';
  document.documentElement.setAttribute('data-theme',savedTheme);
  btnTheme.textContent=savedTheme==='dark'?'☀️':'🌙';
  
  btnTheme.onclick=()=>{
    const current=document.documentElement.getAttribute('data-theme');
    const next=current==='dark'?'light':'dark';
    document.documentElement.setAttribute('data-theme',next);
    localStorage.setItem('theme',next);
    btnTheme.textContent=next==='dark'?'☀️':'🌙';
  };

  // Gestione Ricerca
  const searchInput=document.getElementById('search');
  searchInput.oninput=(e)=>{
    state.search=e.target.value;
    renderActiveSection();
  };

  // Caricamento iniziale vuoto
  updateTitle();
  renderTabs();
  renderActiveSection();
  setStatus('Pronto. In attesa dei dati del torneo.', true);
});
